<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Solar System · 3D Dots</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;user-select:none;}
canvas#c{display:block;cursor:none;width:100vw;height:100vh;}

#planet-info{
  position:fixed;top:clamp(22px,4vh,42px);left:0;right:0;
  text-align:center;pointer-events:none;transition:opacity 0.35s;
}
#p-name-ko{
  color:rgba(255,255,255,0.92);
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:clamp(18px,4vw,32px);font-weight:200;letter-spacing:clamp(5px,1.5vw,12px);
}
#p-name-en{
  color:rgba(180,195,255,0.45);
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(8px,1.4vw,12px);letter-spacing:clamp(3px,1vw,6px);
  text-transform:uppercase;margin-top:4px;
}

.nav-btn{
  position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  color:rgba(200,215,255,0.55);
  font-size:clamp(16px,2.5vw,22px);
  width:clamp(36px,5vw,48px);height:clamp(36px,5vw,48px);
  border-radius:50%;cursor:pointer;transition:all 0.2s;z-index:10;
  display:flex;align-items:center;justify-content:center;
}
.nav-btn:hover{background:rgba(255,255,255,0.13);color:#fff;border-color:rgba(255,255,255,0.28);}
#btn-prev{left:clamp(10px,2vw,24px);}
#btn-next{right:clamp(10px,2vw,24px);}

#planet-dots{
  position:fixed;bottom:clamp(40px,6vh,60px);left:0;right:0;
  display:flex;justify-content:center;gap:clamp(5px,1.2vw,10px);
  pointer-events:none;
}
.p-dot{
  width:clamp(4px,0.8vw,6px);height:clamp(4px,0.8vw,6px);
  border-radius:50%;background:rgba(255,255,255,0.18);transition:all 0.3s;
}
.p-dot.cur{background:rgba(255,255,255,0.85);transform:scale(1.4);}

/* Explosion hint */
#explode-hint{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  color:rgba(255,200,80,0.0);font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(13px,2.5vw,18px);letter-spacing:4px;text-transform:uppercase;
  pointer-events:none;transition:opacity 0.4s;text-align:center;
}

#camwrap{
  position:fixed;bottom:clamp(12px,2vh,20px);right:clamp(12px,2vw,20px);
  width:clamp(130px,20vw,190px);aspect-ratio:4/3;
  border-radius:12px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.13);box-shadow:0 4px 24px rgba(0,0,0,0.6);
  display:none;
}
#camview{width:100%;height:100%;display:block;}
#cam-status{
  position:absolute;top:6px;left:8px;display:flex;align-items:center;gap:5px;
  font-family:'Helvetica Neue',sans-serif;font-size:clamp(7px,1.2vw,9px);
  letter-spacing:1.5px;color:rgba(255,255,255,0.6);text-transform:uppercase;pointer-events:none;
}
#cam-dot{width:6px;height:6px;border-radius:50%;background:#444;flex-shrink:0;transition:background 0.3s,box-shadow 0.3s;}
#cam-dot.on{background:#4eff9a;box-shadow:0 0 5px #4eff9a;}
#cam-btn{
  position:fixed;bottom:clamp(10px,2vh,16px);left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.16);
  color:rgba(200,215,255,0.8);
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(9px,1.5vw,11px);letter-spacing:2.5px;
  padding:clamp(7px,1.2vh,9px) clamp(14px,2.5vw,22px);
  border-radius:50px;cursor:pointer;backdrop-filter:blur(10px);transition:all 0.2s;z-index:10;
  white-space:nowrap;
}
#cam-btn:hover{background:rgba(255,255,255,0.13);color:#fff;}
#hint{
  position:fixed;bottom:clamp(68px,10vh,92px);left:0;right:0;text-align:center;
  color:rgba(160,170,255,0.16);font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(8px,1.2vw,10px);letter-spacing:4px;text-transform:uppercase;pointer-events:none;
  animation:vanish 5s ease-out forwards 3s;
}
@keyframes vanish{to{opacity:0;}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<video id="vid" playsinline autoplay muted style="display:none"></video>

<div id="planet-info">
  <div id="p-name-ko">토성</div>
  <div id="p-name-en">Saturn</div>
</div>
<button class="nav-btn" id="btn-prev">&#8592;</button>
<button class="nav-btn" id="btn-next">&#8594;</button>
<div id="planet-dots"></div>
<div id="explode-hint">💥 폭발!</div>

<div id="camwrap">
  <canvas id="camview"></canvas>
  <div id="cam-status"><div id="cam-dot"></div><span id="cam-label">대기 중</span></div>
</div>
<button id="cam-btn">✋&nbsp;&nbsp;손짓으로 크기 조절</button>
<div id="hint">드래그·화살표로 탐색 &nbsp;·&nbsp; 더블클릭 10회로 폭발</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
// ─── Canvas ────────────────────────────────────────────
const C=document.getElementById('c');
const ctx=C.getContext('2d');
let W,H,cx,cy;
function getBaseScale(){return Math.max(0.45,Math.min(1.1,Math.min(innerWidth,innerHeight)/700));}
function resize(){
  W=C.width=innerWidth; H=C.height=innerHeight; cx=W/2; cy=H/2;
  if(scrollScale===1) scale=scrollScale=getBaseScale();
}
window.addEventListener('resize',resize);

// ─── Input ─────────────────────────────────────────────
let mx=-9999,my=-9999,scale=1,scrollScale=1,camTargetScale=null;
let dragStartX=null,dragging=false;

C.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
C.addEventListener('mouseleave',()=>{mx=-9999;my=-9999;});
C.addEventListener('mousedown',e=>{dragStartX=e.clientX;dragging=false;});
C.addEventListener('mousemove',e=>{if(dragStartX!==null&&Math.abs(e.clientX-dragStartX)>12)dragging=true;});
C.addEventListener('mouseup',e=>{
  if(dragStartX!==null&&dragging){const dx=e.clientX-dragStartX;if(Math.abs(dx)>55)navigate(dx<0?1:-1);}
  dragStartX=null;dragging=false;
});
C.addEventListener('wheel',e=>{
  e.preventDefault();
  scrollScale=Math.max(0.15,Math.min(4,scrollScale*(1-e.deltaY*0.0012)));
  if(camTargetScale===null)scale=scrollScale;
},{passive:false});

let pDist=0,touchStartX=null,touchT0=0,lastTouchEnd=0;
C.addEventListener('touchstart',e=>{
  if(e.touches.length===2)pDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  if(e.touches.length===1){mx=e.touches[0].clientX;my=e.touches[0].clientY;touchStartX=e.touches[0].clientX;}
  // double-tap detection
  const now=Date.now();
  if(now-lastTouchEnd<300){onDblClick();}
  lastTouchEnd=now;
},{passive:true});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    scrollScale=Math.max(0.15,Math.min(4,scrollScale*d/pDist));
    pDist=d;mx=-9999;my=-9999;touchStartX=null;
    if(camTargetScale===null)scale=scrollScale;
  }else if(e.touches.length===1){mx=e.touches[0].clientX;my=e.touches[0].clientY;}
},{passive:false});
C.addEventListener('touchend',e=>{
  if(touchStartX!==null&&e.changedTouches.length===1){
    const dx=e.changedTouches[0].clientX-touchStartX;
    if(Math.abs(dx)>55)navigate(dx<0?1:-1);
  }
  mx=-9999;my=-9999;touchStartX=null;
});

// ─── Double-click → Explosion ──────────────────────────
let dblCount=0,dblTimer=null,blastPhase=null,blastTimer=null,blastFlash=0;
function onDblClick(){
  triggerExplosion();
}
C.addEventListener('click',onDblClick);

function triggerExplosion(){
  if(blastPhase==='explode')return;
  blastPhase='explode';blastFlash=0.55;
  const allD=getAllActiveDots();
  for(const d of allD){
    const a=Math.random()*Math.PI*2,spd=6+Math.random()*38;
    d.bvx=Math.cos(a)*spd;d.bvy=Math.sin(a)*spd;d.bx=0;d.by=0;
  }
  const hint=document.getElementById('explode-hint');
  hint.style.opacity='0.9';setTimeout(()=>hint.style.opacity='0',1000);
  clearTimeout(blastTimer);
  blastTimer=setTimeout(()=>{
    blastPhase='reform';
    blastTimer=setTimeout(()=>{blastPhase=null;},4000);
  },3000);
}
function getAllActiveDots(){
  const list=trans.active?[...trans.fromDots,...trans.toDots]:[...currentDots];
  if(currentIdx===EARTH_IDX||trans.toIdx===EARTH_IDX)satellites.forEach(s=>list.push(s.dot));
  return list;
}

// ─── Stars ─────────────────────────────────────────────
const stars=Array.from({length:720},()=>({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  r:Math.random()<0.07?Math.random()*1.8+1:Math.random()*0.65+0.15,
  a:Math.random(),
  da:(Math.random()*0.013+0.003)*(Math.random()<0.5?1:-1),
  lo:0.06+Math.random()*0.1,hi:0.38+Math.random()*0.55
}));

// ─── Shooting stars ────────────────────────────────────
const shoots=[];
function spawnShoots(){
  if(Math.random()<0.025&&shoots.length<12){
    const ang=Math.random()*Math.PI*0.55+Math.PI*0.04,spd=6+Math.random()*12;
    shoots.push({x:Math.random()*W,y:Math.random()*H*0.5,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,decay:0.007+Math.random()*0.018,len:10+Math.random()*28});
  }
}

// ─── 3D helpers ────────────────────────────────────────
function rotY(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c];}
function rotX(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c];}
function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

const FOV=680,TILT_X=0.40;
const LX=-0.35,LY=0.75,LZ=0.55,LLEN=Math.hypot(LX,LY,LZ);
const lx0=LX/LLEN,ly0=LY/LLEN,lz0=LZ/LLEN;

// ─── Dot3D ──────────────────────────────────────────────
class Dot3D{
  constructor(ox,oy,oz,col,sz){
    this.ox=ox;this.oy=oy;this.oz=oz;this.col=col;this.sz=sz;
    this.dx=0;this.dy=0;this.vx=0;this.vy=0;
    this.bx=0;this.by=0;this.bvx=0;this.bvy=0;
    this.sx=0;this.sy=0;this.depth=0;this.ps=1;
  }
  project(aY,xOff=0){
    let[x,y,z]=rotY(this.ox,this.oy,this.oz,aY);
    [x,y,z]=rotX(x,y,z,TILT_X);
    this.depth=z;
    const p=FOV/(FOV+z*0.45);this.ps=p;
    this.sx=cx+xOff+x*p*scale;
    this.sy=cy+y*p*scale;
  }
  update(){
    if(blastPhase!=='explode'){
      const wx=this.sx+this.dx+this.bx,wy=this.sy+this.dy+this.by;
      const d=Math.hypot(wx-mx,wy-my),R=95;
      if(d<R&&d>0.4){const f=(1-d/R)*(1-d/R)*12;this.vx+=(wx-mx)/d*f;this.vy+=(wy-my)/d*f;}
    }
    this.vx-=this.dx*0.058;this.vy-=this.dy*0.058;
    this.vx*=0.82;this.vy*=0.82;
    this.dx+=this.vx;this.dy+=this.vy;
    // blast
    if(blastPhase==='explode'){
      this.bx+=this.bvx;this.by+=this.bvy;
      this.bvx*=0.972;this.bvy*=0.972;
    }else if(blastPhase==='reform'){
      this.bvx+=(-this.bx)*0.048;this.bvy+=(-this.by)*0.048;
      this.bvx*=0.85;this.bvy*=0.85;
      this.bx+=this.bvx;this.by+=this.bvy;
    }else{
      this.bx*=0.88;this.by*=0.88;this.bvx*=0.88;this.bvy*=0.88;
    }
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.sx+this.dx+this.bx,this.sy+this.dy+this.by,Math.max(0.3,this.sz*this.ps),0,Math.PI*2);
    ctx.fillStyle=this.col;ctx.fill();
  }
}

// ─── Planet build ───────────────────────────────────────
function bodyDot(x,y,z,r,nd,colorFn){
  const nx=x/(r||1),ny=y/(r||1),nz=z/(r||1);
  const diff=Math.max(0,nx*lx0+ny*ly0+nz*lz0);
  return new Dot3D(x,y,z,colorFn(nd,diff,x,y,z),0.65+Math.random()*1.05);
}

function buildPlanet(def){
  const dots=[];
  const{bodyR:BR,sp:SP,colorFn,rings,emissive}=def;
  for(let z=-BR;z<=BR;z+=SP)for(let y=-BR;y<=BR;y+=SP)for(let x=-BR;x<=BR;x+=SP){
    const r2=x*x+y*y+z*z;if(r2>=BR*BR)continue;
    const r=Math.sqrt(r2),nd=r/BR;
    if(emissive)dots.push(new Dot3D(x,y,z,colorFn(nd,x,y,z),0.7+Math.random()*0.9));
    else dots.push(bodyDot(x,y,z,r,nd,colorFn));
  }
  if(rings)for(const rg of rings){
    const{ri,ro,rsp,plane,col:rc}=rg;
    for(let b=-ro;b<=ro;b+=rsp)for(let a=-ro;a<=ro;a+=rsp){
      const r=Math.sqrt(a*a+b*b);if(r<ri||r>ro)continue;
      const t=(r-ri)/(ro-ri);
      const al=(0.12+Math.sin(t*Math.PI)*0.65).toFixed(2);
      const sz=0.5+Math.random()*0.75,col=rc(t,al);
      if(plane==='xz')dots.push(new Dot3D(a,0,b,col,sz));
      else if(plane==='yz')dots.push(new Dot3D(0,a,b,col,sz));
    }
  }
  return dots;
}

// ─── Planet definitions ─────────────────────────────────
const PLANETS=[
  // 0: Sun
  {nameKo:'태양',nameEn:'Sun',bodyR:115,sp:9,emissive:true,isSun:true,rings:null,
   colorFn:(nd,x,y)=>{
     const L=Math.round(58+(1-nd)*37),sat=Math.round(85-nd*35),hue=Math.round(22+nd*22);
     return`hsla(${hue},${sat}%,${L}%,${(0.65+(1-nd)*0.35).toFixed(2)})`;
   }},
  // 1: Mercury
  {nameKo:'수성',nameEn:'Mercury',bodyR:22,sp:4.5,rings:null,
   colorFn:(nd,d)=>`hsla(25,12%,${Math.round(18+d*42)}%,${(0.6+(1-nd)*0.4).toFixed(2)})`},
  // 2: Venus
  {nameKo:'금성',nameEn:'Venus',bodyR:50,sp:6,rings:null,
   colorFn:(nd,d)=>`hsla(${50+nd*5},${30+d*10}%,${Math.round(40+d*38)}%,${(0.6+(1-nd)*0.4).toFixed(2)})`},
  // 3: Earth
  {nameKo:'지구',nameEn:'Earth',bodyR:52,sp:6,rings:null,
   colorFn:(nd,d,x,y,z)=>{
     const n=Math.sin(x*0.28)*Math.cos(y*0.22)*Math.sin(z*0.20);
     const L=Math.round(18+d*52),a=(0.6+(1-nd)*0.4).toFixed(2);
     return n>0.08?`hsla(${110+n*25},${40+d*15}%,${L}%,${a})`:`hsla(${205+n*12},${60+d*15}%,${L}%,${a})`;
   }},
  // 4: Mars
  {nameKo:'화성',nameEn:'Mars',bodyR:38,sp:5.5,rings:null,
   colorFn:(nd,d)=>`hsla(${14+nd*8},${62+d*10}%,${Math.round(16+d*44)}%,${(0.6+(1-nd)*0.4).toFixed(2)})`},
  // 5: Jupiter
  {nameKo:'목성',nameEn:'Jupiter',bodyR:92,sp:8.5,rings:null,
   colorFn:(nd,d,x,y)=>{
     const band=(Math.sin(y*0.18)+1)*0.5,hue=28+band*18,sat=42+band*22;
     return`hsla(${hue},${sat}%,${Math.round(20+d*45)}%,${(0.55+(1-nd)*0.45).toFixed(2)})`;
   }},
  // 6: Saturn
  {nameKo:'토성',nameEn:'Saturn',bodyR:65,sp:6.5,
   colorFn:(nd,d)=>{const h=38+(1-nd)*6,s=60+d*15,l=Math.round(20+d*58);return`hsla(${h},${s}%,${l}%,${(0.50+(1-nd)*0.50).toFixed(2)})`;},
   rings:[{ri:92,ro:160,rsp:4.8,plane:'xz',col:(t,a)=>Math.random()<0.3?`rgba(255,242,210,${a})`:`rgba(235,225,195,${a})`}]},
  // 7: Uranus
  {nameKo:'천왕성',nameEn:'Uranus',bodyR:58,sp:6.5,
   colorFn:(nd,d)=>`hsla(185,${38+d*12}%,${Math.round(28+d*42)}%,${(0.55+(1-nd)*0.45).toFixed(2)})`,
   rings:[{ri:78,ro:108,rsp:4.5,plane:'yz',col:(t,a)=>`rgba(170,220,240,${(parseFloat(a)*0.6).toFixed(2)})`}]},
  // 8: Neptune
  {nameKo:'해왕성',nameEn:'Neptune',bodyR:52,sp:6,
   colorFn:(nd,d)=>`hsla(${220+nd*10},${72+d*12}%,${Math.round(14+d*46)}%,${(0.55+(1-nd)*0.45).toFixed(2)})`,
   rings:[{ri:95,ro:118,rsp:5.5,plane:'xz',col:(t,a)=>`rgba(140,180,255,${(parseFloat(a)*0.35).toFixed(2)})`}]},
];

const EARTH_IDX=3;
const SATURN_IDX=6;
let currentIdx=6; // start at Saturn

// Planet glow configs: [r,g,b, innerSize, outerSize, alpha]
const GLOWS=[
  [255,230,80, 300,600,0.22],   // Sun
  [180,150,100,80,160,0.04],    // Mercury
  [220,200,100,90,180,0.05],    // Venus
  [80,130,220, 100,200,0.06],   // Earth
  [220,80,50,  90,180,0.06],    // Mars
  [220,170,100,120,240,0.06],   // Jupiter
  [255,215,110,110,220,0.05],   // Saturn
  [100,200,210,100,200,0.05],   // Uranus
  [80,120,255, 100,200,0.06],   // Neptune
];

// ─── Planet cache ───────────────────────────────────────
const planetCache={};
planetCache[currentIdx]=buildPlanet(PLANETS[currentIdx]);
let currentDots=planetCache[currentIdx];
setTimeout(()=>{for(let i=0;i<PLANETS.length;i++)if(!planetCache[i])planetCache[i]=buildPlanet(PLANETS[i]);},80);

// ─── Satellites (Earth) ─────────────────────────────────
const SAT_CFG=[
  {r:80,spd:0.023,ph:0.0,inc:0.12},{r:92,spd:0.018,ph:1.2,inc:0.50},
  {r:102,spd:0.015,ph:2.4,inc:0.22},{r:112,spd:0.012,ph:3.6,inc:0.80},
  {r:76,spd:0.028,ph:4.8,inc:0.32},{r:96,spd:0.020,ph:0.7,inc:1.05},
  {r:122,spd:0.010,ph:1.5,inc:0.42},{r:86,spd:0.022,ph:2.8,inc:0.65},
  {r:108,spd:0.013,ph:4.0,inc:0.18},{r:132,spd:0.008,ph:5.2,inc:0.72},
];
const ARM_OFFSETS=[[0,0,0],[5,0,0],[-5,0,0],[0,5,0],[0,-5,0]];
const satellites=[];
for(const c of SAT_CFG){
  for(const arm of ARM_OFFSETS){
    satellites.push({
      dot:new Dot3D(0,0,0,'rgba(210,225,255,0.82)',0.72),
      r:c.r,spd:c.spd,ph:c.ph,inc:c.inc,arm
    });
  }
}
function updateSatellites(){
  for(const s of satellites){
    s.ph+=s.spd;
    const a=s.ph;
    const bx=Math.cos(a)*s.r,bz=Math.sin(a)*s.r,by=Math.sin(a*0.7)*s.r*Math.tan(s.inc);
    s.dot.ox=bx+s.arm[0];s.dot.oy=by+s.arm[1];s.dot.oz=bz+s.arm[2];
  }
}

// ─── Saturn Moons ───────────────────────────────────────
const MOON_CFGS=[
  { name:'Titan',     r:10, sp:3.2, orbitR:215, spd:0.0072, ph:0.0,  inc:0.05,
    color:(nd,d)=>`hsla(${30+nd*14},${52+d*12}%,${Math.round(28+d*38)}%,${(0.72+(1-nd)*0.28).toFixed(2)})` },
  { name:'Enceladus', r:5,  sp:2.0, orbitR:145, spd:0.019,  ph:1.2,  inc:0.00,
    color:(nd,d)=>`hsla(200,${30+d*20}%,${Math.round(60+(1-nd)*30)}%,${(0.75+(1-nd)*0.25).toFixed(2)})` },
  { name:'Rhea',      r:7,  sp:2.5, orbitR:178, spd:0.011,  ph:2.4,  inc:0.03,
    color:(nd,d)=>`hsla(210,${6+d*6}%,${Math.round(48+(1-nd)*30)}%,${(0.72+(1-nd)*0.28).toFixed(2)})` },
  { name:'Dione',     r:6,  sp:2.3, orbitR:160, spd:0.014,  ph:3.6,  inc:0.02,
    color:(nd,d)=>`hsla(205,${8+d*8}%,${Math.round(50+(1-nd)*28)}%,${(0.72+(1-nd)*0.28).toFixed(2)})` },
  { name:'Tethys',    r:6,  sp:2.3, orbitR:148, spd:0.017,  ph:4.8,  inc:0.01,
    color:(nd,d)=>`hsla(200,${10+d*8}%,${Math.round(55+(1-nd)*25)}%,${(0.72+(1-nd)*0.28).toFixed(2)})` },
  { name:'Iapetus',   r:8,  sp:2.7, orbitR:245, spd:0.0046, ph:1.8,  inc:0.14,
    color:(nd,d,x)=>x<0
      ?`hsla(22,14%,${Math.round(6+(1-nd)*16)}%,${(0.72+(1-nd)*0.28).toFixed(2)})`
      :`hsla(210,7%,${Math.round(52+(1-nd)*28)}%,${(0.72+(1-nd)*0.28).toFixed(2)})` },
];

const saturnMoons=MOON_CFGS.map(cfg=>{
  const moonDots=[];
  const{r,sp,color}=cfg;
  for(let z=-r;z<=r;z+=sp)for(let y=-r;y<=r;y+=sp)for(let x=-r;x<=r;x+=sp){
    const r2=x*x+y*y+z*z;if(r2>=r*r)continue;
    const nd=Math.sqrt(r2)/r,rr=Math.sqrt(r2)||1;
    const diff=Math.max(0,(x/rr)*lx0+(y/rr)*ly0+(z/rr)*lz0);
    moonDots.push({lx:x,ly:y,lz:z,dot:new Dot3D(0,0,0,color(nd,diff,x),0.5+Math.random()*0.7)});
  }
  return{...cfg,moonDots,angle:cfg.ph};
});

function updateSaturnMoons(){
  for(const m of saturnMoons){
    m.angle+=m.spd;
    const a=m.angle;
    const ox=Math.cos(a)*m.orbitR,oz=Math.sin(a)*m.orbitR,oy=Math.sin(a)*m.orbitR*Math.tan(m.inc);
    for(const md of m.moonDots){md.dot.ox=md.lx+ox;md.dot.oy=md.ly+oy;md.dot.oz=md.lz+oz;}
  }
}

// Moon label: draw name tags after dots
function drawMoonLabels(xOff){
  ctx.save();
  ctx.font=`${Math.round(9*scale+7)}px 'Helvetica Neue',Arial,sans-serif`;
  ctx.textAlign='center';
  for(const m of saturnMoons){
    // use first moonDot as position reference
    const ref=m.moonDots[0]?.dot;
    if(!ref)continue;
    const lx=ref.sx+ref.dx+ref.bx, ly=ref.sy+ref.dy+ref.by-Math.round(14*scale+8);
    ctx.fillStyle='rgba(210,225,255,0.45)';
    ctx.fillText(m.name,lx,ly);
  }
  ctx.restore();
}

// ─── Navigation / Transition ────────────────────────────
const trans={active:false,t:0,dir:1,fromDots:null,toDots:null,toIdx:0};

function navigate(dir){
  if(trans.active)return;
  const toIdx=(currentIdx+dir+PLANETS.length)%PLANETS.length;
  if(!planetCache[toIdx])planetCache[toIdx]=buildPlanet(PLANETS[toIdx]);
  trans.active=true;trans.t=0;trans.dir=dir;
  trans.fromDots=currentDots;trans.toDots=planetCache[toIdx];trans.toIdx=toIdx;
  const info=document.getElementById('planet-info');
  info.style.opacity='0';
  setTimeout(()=>{
    document.getElementById('p-name-ko').textContent=PLANETS[toIdx].nameKo;
    document.getElementById('p-name-en').textContent=PLANETS[toIdx].nameEn;
    info.style.opacity='1';
  },250);
  updateIndicator(toIdx);
}

function updateIndicator(idx){
  document.querySelectorAll('.p-dot').forEach((d,i)=>d.classList.toggle('cur',i===idx));
}

// build indicator dots
const dotsEl=document.getElementById('planet-dots');
PLANETS.forEach((_,i)=>{
  const d=document.createElement('div');d.className='p-dot';
  if(i===currentIdx)d.classList.add('cur');
  dotsEl.appendChild(d);
});
document.getElementById('btn-prev').addEventListener('click',()=>navigate(-1));
document.getElementById('btn-next').addEventListener('click',()=>navigate(1));

// ─── Draw helpers ───────────────────────────────────────
const DSORT=(a,b)=>a.depth-b.depth;
let angleY=0;

function drawPlanetSet(dots,xOff,isEarth,isSaturn){
  for(const d of dots)d.project(angleY,xOff);
  if(isEarth)for(const s of satellites)s.dot.project(angleY,xOff);
  if(isSaturn)for(const m of saturnMoons)for(const md of m.moonDots)md.dot.project(angleY,xOff);
  let all=[...dots];
  if(isEarth)all=[...all,...satellites.map(s=>s.dot)];
  if(isSaturn)all=[...all,...saturnMoons.flatMap(m=>m.moonDots.map(md=>md.dot))];
  all.sort(DSORT);
  for(const d of all){d.update();d.draw();}
  if(isSaturn)drawMoonLabels(xOff);
}

function drawGlow(idx,alpha=1){
  const[r,g,b,si,so,a]=GLOWS[idx];
  const ga=ctx.createRadialGradient(cx,cy,0,cx,cy,so*scale);
  ga.addColorStop(0,`rgba(${r},${g},${b},${(a*alpha).toFixed(3)})`);
  ga.addColorStop(0.35,`rgba(${r},${g},${b},${(a*alpha*0.4).toFixed(3)})`);
  ga.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ga;ctx.fillRect(0,0,W,H);
}

function drawSunCorona(){
  const t=Date.now()*0.001;
  // Multi-layer glow
  for(let i=0;i<4;i++){
    const r=(200+i*80)*scale;
    const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    sg.addColorStop(0,`rgba(255,250,180,${0.18-i*0.04})`);
    sg.addColorStop(0.2,`rgba(255,200,60,${0.10-i*0.02})`);
    sg.addColorStop(0.6,`rgba(255,100,10,${0.04-i*0.008})`);
    sg.addColorStop(1,'rgba(255,50,0,0)');
    ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
  }
  // Solar flares
  for(let i=0;i<4;i++){
    const ang=t*0.4*(i%2===0?1:-1)+i*Math.PI*0.52;
    const fr=(90+i*22)*scale;
    const fx=cx+Math.cos(ang)*fr*0.55,fy=cy+Math.sin(ang)*fr*0.35;
    const fg=ctx.createRadialGradient(fx,fy,0,fx,fy,fr*0.7);
    fg.addColorStop(0,`rgba(255,${180+i*15},50,0.07)`);
    fg.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=fg;ctx.fillRect(0,0,W,H);
  }
}

// ─── Main loop ──────────────────────────────────────────
function frame(){
  requestAnimationFrame(frame);
  angleY+=0.0038;
  if(camTargetScale!==null){scale+=(camTargetScale-scale)*0.10;scrollScale=scale;}

  ctx.fillStyle='#00000e';ctx.fillRect(0,0,W,H);
  // Ambient glow
  const nb=ctx.createRadialGradient(cx,cy*0.85,0,cx,cy,280*scale);
  nb.addColorStop(0,'rgba(50,35,90,0.07)');nb.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=nb;ctx.fillRect(0,0,W,H);

  // Stars
  for(const s of stars){
    s.a+=s.da;
    if(s.a>s.hi){s.a=s.hi;s.da=-Math.abs(s.da);}if(s.a<s.lo){s.a=s.lo;s.da=Math.abs(s.da);}
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a.toFixed(2)})`;ctx.fill();
  }

  // Shooting stars
  spawnShoots();
  for(let i=shoots.length-1;i>=0;i--){
    const s=shoots[i];s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
    if(s.life<=0||s.x>W+80||s.y>H+80){shoots.splice(i,1);continue;}
    const spd=Math.hypot(s.vx,s.vy);
    const tx=s.x-(s.vx/spd)*s.len,ty=s.y-(s.vy/spd)*s.len;
    const gr=ctx.createLinearGradient(s.x,s.y,tx,ty);
    gr.addColorStop(0,`rgba(255,255,255,${(s.life*0.95).toFixed(2)})`);
    gr.addColorStop(0.5,`rgba(200,210,255,${(s.life*0.4).toFixed(2)})`);
    gr.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(tx,ty);
    ctx.strokeStyle=gr;ctx.lineWidth=1.6*s.life;ctx.stroke();
  }

  // Planet glow + Sun special
  if(trans.active){
    drawGlow(currentIdx,1-easeInOut(trans.t));
    drawGlow(trans.toIdx,easeInOut(trans.t));
  }else{
    drawGlow(currentIdx);
    if(PLANETS[currentIdx].isSun)drawSunCorona();
  }

  // Update satellites & moons
  if(currentIdx===EARTH_IDX||(trans.active&&(trans.fromDots===planetCache[EARTH_IDX]||trans.toDots===planetCache[EARTH_IDX])))
    updateSatellites();
  if(currentIdx===SATURN_IDX||(trans.active&&(trans.fromDots===planetCache[SATURN_IDX]||trans.toDots===planetCache[SATURN_IDX])))
    updateSaturnMoons();

  // Draw planets
  if(trans.active){
    trans.t=Math.min(1,trans.t+0.028);
    const e=easeInOut(trans.t);
    const fromOff=-trans.dir*e*W,toOff=trans.dir*(1-e)*W;
    drawPlanetSet(trans.fromDots,fromOff,trans.fromDots===planetCache[EARTH_IDX],trans.fromDots===planetCache[SATURN_IDX]);
    drawPlanetSet(trans.toDots,toOff,trans.toDots===planetCache[EARTH_IDX],trans.toDots===planetCache[SATURN_IDX]);
    if(trans.t>=1){currentDots=trans.toDots;currentIdx=trans.toIdx;trans.active=false;}
  }else{
    drawPlanetSet(currentDots,0,currentIdx===EARTH_IDX,currentIdx===SATURN_IDX);
  }

  // Explosion flash
  if(blastFlash>0){
    ctx.fillStyle=`rgba(255,200,80,${blastFlash.toFixed(3)})`;
    ctx.fillRect(0,0,W,H);
    blastFlash=Math.max(0,blastFlash-0.035);
  }

  // Cursor
  if(mx>0&&mx<W&&my>0&&my<H){
    const cg=ctx.createRadialGradient(mx,my,0,mx,my,52);
    cg.addColorStop(0,'rgba(180,200,255,0.11)');cg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);
    ctx.beginPath();ctx.arc(mx,my,2.2,0,Math.PI*2);
    ctx.fillStyle='rgba(200,215,255,0.6)';ctx.fill();
  }
}

// init
resize();
frame();

// ─── Camera / Hand gesture ──────────────────────────────
const vid=document.getElementById('vid');
const camWrap=document.getElementById('camwrap');
const camCanvas=document.getElementById('camview');
const camCtx=camCanvas.getContext('2d');
camCanvas.width=320;camCanvas.height=240;
const camDot=document.getElementById('cam-dot');
const camLabel=document.getElementById('cam-label');
const CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
function pinchToScale(d){return 0.2+Math.max(0,Math.min(1,(d-0.03)/0.37))*3.8;}
let handLostTimer=null,handActive=false;
function onHandResults(res){
  camCtx.save();camCtx.scale(-1,1);camCtx.translate(-320,0);
  camCtx.drawImage(res.image,0,0,320,240);camCtx.restore();
  if(!res.multiHandLandmarks?.length){
    if(handActive&&!handLostTimer)handLostTimer=setTimeout(()=>{
      camTargetScale=null;handActive=false;camDot.classList.remove('on');camLabel.textContent='손 없음';handLostTimer=null;
    },600);return;
  }
  if(handLostTimer){clearTimeout(handLostTimer);handLostTimer=null;}
  const lm=res.multiHandLandmarks[0];
  const th=lm[4],ix=lm[8];
  camCtx.strokeStyle='rgba(100,200,255,0.45)';camCtx.lineWidth=1.2;
  for(const[a,b]of CONN){camCtx.beginPath();camCtx.moveTo((1-lm[a].x)*320,lm[a].y*240);camCtx.lineTo((1-lm[b].x)*320,lm[b].y*240);camCtx.stroke();}
  for(const l of lm){camCtx.beginPath();camCtx.arc((1-l.x)*320,l.y*240,2.5,0,Math.PI*2);camCtx.fillStyle='rgba(100,200,255,0.6)';camCtx.fill();}
  const tx=(1-th.x)*320,ty=th.y*240,iix=(1-ix.x)*320,iiy=ix.y*240;
  camCtx.beginPath();camCtx.arc(tx,ty,7,0,Math.PI*2);camCtx.fillStyle='#ff6b6b';camCtx.fill();
  camCtx.beginPath();camCtx.arc(iix,iiy,7,0,Math.PI*2);camCtx.fillStyle='#4ecdc4';camCtx.fill();
  camCtx.beginPath();camCtx.moveTo(tx,ty);camCtx.lineTo(iix,iiy);camCtx.strokeStyle='rgba(255,255,255,0.7)';camCtx.lineWidth=2;camCtx.stroke();
  camTargetScale=pinchToScale(Math.hypot(th.x-ix.x,th.y-ix.y));
  handActive=true;camDot.classList.add('on');camLabel.textContent='손 인식 중';
}
document.getElementById('cam-btn').addEventListener('click',async()=>{
  const btn=document.getElementById('cam-btn');
  if(typeof Hands==='undefined'){btn.textContent='라이브러리 로드 실패';return;}
  btn.textContent='연결 중…';btn.style.pointerEvents='none';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}});
    vid.srcObject=stream;await vid.play();
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.72,minTrackingConfidence:0.5});
    hands.onResults(onHandResults);
    let proc=false;
    async function camLoop(){if(!proc&&vid.readyState>=2){proc=true;await hands.send({image:vid});proc=false;}setTimeout(camLoop,33);}
    camLoop();
    camWrap.style.display='block';btn.style.display='none';camLabel.textContent='손 없음';
  }catch(e){btn.textContent='카메라 권한이 필요합니다';btn.style.pointerEvents='auto';}
});
</script>
