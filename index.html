<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Solar System · 3D Dots</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;user-select:none;}
canvas#c{display:block;cursor:none;width:100vw;height:100vh;}

#planet-info{
  position:fixed;top:clamp(22px,4vh,42px);left:0;right:0;
  text-align:center;pointer-events:none;transition:opacity 0.35s;
}
#p-name-ko{
  color:rgba(255,255,255,0.92);
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:clamp(18px,4vw,32px);font-weight:200;letter-spacing:clamp(5px,1.5vw,12px);
}
#p-name-en{
  color:rgba(180,195,255,0.45);
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(8px,1.4vw,12px);letter-spacing:clamp(3px,1vw,6px);

}

.nav-btn{
  position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);

#btn-prev{left:clamp(10px,2vw,24px);}
#btn-next{right:clamp(10px,2vw,24px);}

/* ── Intro ── */
#intro{
  position:fixed;inset:0;z-index:100;
  opacity:1;transition:opacity 0.35s ease;
  pointer-events:auto;
}
#intro.hidden{opacity:0;pointer-events:none;}
#intro-c{position:absolute;inset:0;width:100%;height:100%;cursor:none;}

#intro-title{
  position:absolute;top:clamp(24px,4.5vh,48px);
  left:0;right:0;text-align:center;pointer-events:none;
}
#intro-title-a{
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(9px,1.4vw,12px);letter-spacing:clamp(6px,1.8vw,14px);
  color:rgba(180,195,255,0.35);text-transform:uppercase;
  opacity:0;animation:ifadein 1.8s ease 0.3s forwards;
}
#intro-title-b{
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;

  letter-spacing:clamp(6px,1.5vw,14px);
  color:rgba(225,232,255,0.88);margin-top:8px;

}
@keyframes ifadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

#intro-hint{
  position:absolute;bottom:clamp(28px,5vh,48px);

}
@keyframes ipulse{0%,100%{opacity:0.32;}50%{opacity:0.68;}}

#intro-label{
  position:absolute;pointer-events:none;
  font-family:'Helvetica Neue',Arial,sans-serif;

}
#intro-label.show{opacity:1;}

#intro-flash{
  position:fixed;inset:0;z-index:101;background:#fff;
  opacity:0;pointer-events:none;transition:opacity 0.15s;
}
#intro-flash.on{opacity:0.28;}

/* 메인 UI 초기 숨김 */
.main-ui{transition:opacity 0.5s;}
.main-ui.hidden{opacity:0;pointer-events:none !important;}
#minimap{
  position:fixed;
  bottom:clamp(14px,3vh,28px);

  display:flex;align-items:flex-end;
  gap:2px;
  background:rgba(3,5,16,0.75);

}
.mm-item{
  display:flex;flex-direction:column;align-items:center;
  gap:5px;padding:3px 6px 3px;
  cursor:pointer;border-radius:10px;
  transition:background 0.18s;position:relative;
}
.mm-item:hover{background:rgba(255,255,255,0.07);}
.mm-item.cur{background:rgba(140,165,255,0.11);}
.mm-orb{
  border-radius:50%;flex-shrink:0;
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
}
.mm-item.cur .mm-orb{transform:scale(1.45) translateY(-1px);}
.mm-label{
  font-family:'Helvetica Neue',Arial,sans-serif;

}
.mm-item.cur .mm-label{color:rgba(200,215,255,0.72);}
.mm-item:hover .mm-label{color:rgba(200,215,255,0.55);}
/* Selected planet pulse glow — dynamically applied via JS */
@keyframes orbglow{
  0%,100%{box-shadow:var(--orb-glow-lo);}
  50%{box-shadow:var(--orb-glow-hi);}
}
.mm-orb.glow-active{animation:orbglow 1.8s ease-in-out infinite;}

#sound-btn{
  position:fixed;top:clamp(14px,2.5vh,22px);right:clamp(14px,2.5vw,22px);

  color:rgba(200,215,255,0.5);font-size:15px;
  width:clamp(34px,4.5vw,42px);height:clamp(34px,4.5vw,42px);

}

#cam-btn{
  position:fixed;bottom:clamp(88px,14vh,108px);left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.16);
  color:rgba(200,215,255,0.8);font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(9px,1.5vw,11px);letter-spacing:2.5px;
  padding:clamp(7px,1.2vh,9px) clamp(14px,2.5vw,22px);
  border-radius:50px;cursor:pointer;backdrop-filter:blur(10px);transition:all 0.2s;z-index:10;white-space:nowrap;
}
#cam-btn:hover{background:rgba(255,255,255,0.13);color:#fff;}
#hint{
  position:fixed;bottom:clamp(88px,13vh,112px);left:0;right:0;text-align:center;
  color:rgba(160,170,255,0.16);font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(8px,1.2vw,10px);letter-spacing:4px;text-transform:uppercase;pointer-events:none;
  animation:vanish 5s ease-out forwards 3s;
}
@keyframes vanish{to{opacity:0;}}

/* Planet Info Popup */
#planet-popup{
  position:fixed;top:50%;right:clamp(16px,3vw,40px);transform:translateY(-50%);
  width:clamp(200px,26vw,300px);background:rgba(5,8,22,0.82);
  border:1px solid rgba(140,165,255,0.18);border-radius:14px;
  padding:clamp(14px,2.5vh,22px) clamp(14px,2vw,22px);backdrop-filter:blur(18px);
  pointer-events:none;opacity:0;transition:opacity 0.35s ease,transform 0.35s ease;
  transform:translateY(-50%) translateX(12px);z-index:20;
  box-shadow:0 8px 40px rgba(0,0,20,0.6),inset 0 0 0 1px rgba(180,200,255,0.05);
}
#planet-popup.visible{opacity:1;transform:translateY(-50%) translateX(0);}
#popup-title{
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:clamp(13px,2vw,17px);font-weight:300;color:rgba(200,215,255,0.95);
  letter-spacing:3px;margin-bottom:10px;padding-bottom:9px;
  border-bottom:1px solid rgba(140,165,255,0.15);
}
#popup-lines{list-style:none;display:flex;flex-direction:column;gap:5px;}
#popup-lines li{
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:clamp(9px,1.25vw,11.5px);color:rgba(170,185,230,0.80);
  line-height:1.55;padding-left:10px;position:relative;
}
#popup-lines li::before{content:'';position:absolute;left:0;top:7px;width:3px;height:3px;border-radius:50%;background:rgba(140,165,255,0.55);}

<body>
<canvas id="c"></canvas>
<video id="vid" playsinline autoplay muted style="display:none"></video>

<!-- ── Intro Overlay ── -->
<div id="intro">
  <canvas id="intro-c"></canvas>
  <div id="intro-title">
    <div id="intro-title-a">Explore the Universe</div>
    <div id="intro-title-b">Solar System</div>
  </div>
  <div id="intro-hint">행성을 선택해 탐험을 시작하세요</div>
  <div id="intro-label"></div>
</div>
<div id="intro-flash"></div>

<!-- ── Main UI ── -->
<div id="planet-info" class="main-ui hidden">
  <div id="p-name-ko">토성</div>
  <div id="p-name-en">Saturn</div>
</div>
<button class="nav-btn main-ui hidden" id="btn-prev">&#8592;</button>
<button class="nav-btn main-ui hidden" id="btn-next">&#8594;</button>
<div id="minimap" class="main-ui hidden"></div>
<div id="explode-hint">💥 폭발!</div>
<button id="sound-btn" class="main-ui hidden" title="사운드 켜기/끄기">🔇</button>
<button id="home-btn" class="main-ui hidden" title="태양계 전체보기 (ESC)">⊙</button>

<div id="planet-popup">
  <div id="popup-title">토성 · Saturn</div>
  <ul id="popup-lines"></ul>
</div>

<div id="camwrap">
  <canvas id="camview"></canvas>
  <div id="cam-status"><div id="cam-dot"></div><span id="cam-label">대기 중</span></div>
</div>
<button id="cam-btn" class="main-ui hidden">✋&nbsp;&nbsp;손짓으로 크기 조절 · 회전</button>
<div id="hint" class="main-ui hidden">드래그·화살표로 탐색 &nbsp;·&nbsp; 클릭으로 폭발 &nbsp;·&nbsp; 숫자키 1~9로 바로 이동</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
// ─── Canvas ────────────────────────────────────────────
const C=document.getElementById('c');
const ctx=C.getContext('2d');
let W,H,cx,cy;
function getBaseScale(){return Math.max(0.45,Math.min(1.1,Math.min(innerWidth,innerHeight)/700));}
function resize(){
  W=C.width=innerWidth;
  H=C.height=innerHeight;
  cx=W/2;cy=H/2;
  if(scrollScale===1)scale=scrollScale=getBaseScale();
}
window.addEventListener('resize',resize);

// ─── Input ─────────────────────────────────────────────
let mx=-9999,my=-9999,scale=1,scrollScale=1,camTargetScale=null;
let dragStartX=null,dragging=false;
let lastWristX=null,camRotDelta=0; // 손 회전 제어

C.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
C.addEventListener('mouseleave',()=>{mx=-9999;my=-9999;});
C.addEventListener('mousedown',e=>{dragStartX=e.clientX;dragging=false;});
C.addEventListener('mousemove',e=>{if(dragStartX!==null&&Math.abs(e.clientX-dragStartX)>12)dragging=true;});
C.addEventListener('mouseup',e=>{
  if(dragStartX!==null&&dragging){const dx=e.clientX-dragStartX;if(Math.abs(dx)>55)navigate(dx<0?1:-1);}
  dragStartX=null;dragging=false;
});
C.addEventListener('wheel',e=>{
  e.preventDefault();
  scrollScale=Math.max(0.15,Math.min(4,scrollScale*(1-e.deltaY*0.0012)));
  if(camTargetScale===null)scale=scrollScale;
},{passive:false});

let pDist=0,touchStartX=null,lastTouchEnd=0;
C.addEventListener('touchstart',e=>{
  if(e.touches.length===2)pDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  if(e.touches.length===1){mx=e.touches[0].clientX;my=e.touches[0].clientY;touchStartX=e.touches[0].clientX;}
  const now=Date.now();if(now-lastTouchEnd<300)onDblClick();lastTouchEnd=now;
},{passive:true});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    scrollScale=Math.max(0.15,Math.min(4,scrollScale*d/pDist));pDist=d;mx=-9999;my=-9999;touchStartX=null;
    if(camTargetScale===null)scale=scrollScale;
  }else if(e.touches.length===1){mx=e.touches[0].clientX;my=e.touches[0].clientY;}
},{passive:false});
C.addEventListener('touchend',e=>{
  if(touchStartX!==null&&e.changedTouches.length===1){const dx=e.changedTouches[0].clientX-touchStartX;if(Math.abs(dx)>55)navigate(dx<0?1:-1);}
  mx=-9999;my=-9999;touchStartX=null;
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);
  if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);
  const n=parseInt(e.key);if(n>=1&&n<=9)navigateTo(n-1);
  if(e.key==='Escape')returnToIntro();
});

// ─── Explosion ─────────────────────────────────────────
let blastPhase=null,blastTimer=null,blastFlash=0;
function onDblClick(){triggerExplosion();}
C.addEventListener('click',onDblClick);
function triggerExplosion(){
  if(blastPhase==='explode')return;
  blastPhase='explode';blastFlash=0.55;
  const allD=getAllActiveDots();
  for(const d of allD){const a=Math.random()*Math.PI*2,spd=6+Math.random()*38;d.bvx=Math.cos(a)*spd;d.bvy=Math.sin(a)*spd;d.bx=0;d.by=0;}
  const hint=document.getElementById('explode-hint');
  hint.style.opacity='0.9';setTimeout(()=>hint.style.opacity='0',1000);
  clearTimeout(blastTimer);
  blastTimer=setTimeout(()=>{blastPhase='reform';blastTimer=setTimeout(()=>{blastPhase=null;},4000);},3000);
}
function getAllActiveDots(){
  const list=trans.active?[...trans.fromDots,...trans.toDots]:[...currentDots];
  if(currentIdx===EARTH_IDX||trans.toIdx===EARTH_IDX)satellites.forEach(s=>list.push(s.dot));
  return list;
}

// ─── Stars ─────────────────────────────────────────────
const stars=Array.from({length:720},()=>({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  r:Math.random()<0.07?Math.random()*1.8+1:Math.random()*0.65+0.15,
  a:Math.random(),da:(Math.random()*0.013+0.003)*(Math.random()<0.5?1:-1),
  lo:0.06+Math.random()*0.1,hi:0.38+Math.random()*0.55
}));
const shoots=[];
function spawnShoots(){
  if(Math.random()<0.025&&shoots.length<12){
    const ang=Math.random()*Math.PI*0.55+Math.PI*0.04,spd=6+Math.random()*12;
    shoots.push({x:Math.random()*W,y:Math.random()*H*0.5,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,decay:0.007+Math.random()*0.018,len:10+Math.random()*28});
  }
}

// ─── Meteor Shower ──────────────────────────────────────
// 30~90초마다 랜덤 발생, 지속 4~6초, 밀집 유성 80개
const meteors=[];
let meteorShowerTimer=0,meteorShowerActive=false,meteorShowerDuration=0;
let meteorShowerInterval=Math.random()*60000+30000; // 30~90초

function tickMeteorShower(dt){
  meteorShowerTimer+=dt;
  if(!meteorShowerActive&&meteorShowerTimer>meteorShowerInterval){
    meteorShowerActive=true;
    meteorShowerDuration=4000+Math.random()*2500;
    meteorShowerTimer=0;
    meteorShowerInterval=Math.random()*60000+30000;
    // 유성우 알림
    showEventToast('☄️  유성우 관측 중');
  }
  if(meteorShowerActive){
    // 매 프레임 1~3개 생성
    const batch=Math.random()<0.6?1:Math.random()<0.5?2:3;
    for(let i=0;i<batch;i++){
      if(meteors.length>120)break;
      // 화면 상단 + 좌상단 랜덤 진입
      const ang=Math.PI*0.18+Math.random()*Math.PI*0.22;
      const spd=9+Math.random()*16;
      meteors.push({
        x:Math.random()*W*1.1-W*0.05,
        y:-10-Math.random()*60,
        vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
        life:1, decay:0.008+Math.random()*0.014,
        len:18+Math.random()*52,
        width:0.8+Math.random()*1.4,
        bright:0.55+Math.random()*0.45,
        hue:Math.round(180+Math.random()*60) // 청백~청록
      });
    }
    meteorShowerDuration-=dt;
    if(meteorShowerDuration<=0)meteorShowerActive=false;
  }
}

function drawMeteors(){
  for(let i=meteors.length-1;i>=0;i--){
    const s=meteors[i];
    s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
    if(s.life<=0||s.x>W+100||s.y>H+100){meteors.splice(i,1);continue;}
    const spd=Math.hypot(s.vx,s.vy);
    const tx=s.x-(s.vx/spd)*s.len,ty=s.y-(s.vy/spd)*s.len;
    const gr=ctx.createLinearGradient(s.x,s.y,tx,ty);
    const a=(s.life*s.bright).toFixed(2);
    gr.addColorStop(0,`rgba(255,255,255,${a})`);
    gr.addColorStop(0.2,`hsla(${s.hue},90%,85%,${(s.life*s.bright*0.8).toFixed(2)})`);
    gr.addColorStop(0.6,`hsla(${s.hue},70%,65%,${(s.life*s.bright*0.35).toFixed(2)})`);
    gr.addColorStop(1,'rgba(100,160,255,0)');
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(tx,ty);
    ctx.strokeStyle=gr;ctx.lineWidth=s.width*s.life;ctx.stroke();
    // 선두 광점
    ctx.beginPath();ctx.arc(s.x,s.y,s.width*0.9*s.life,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${(s.life*0.7).toFixed(2)})`;ctx.fill();
  }
}

function drawProbeShape(p){
  const pattern=PROBE_PATTERNS[PROBE_PATTERN_MAP[p.name]||'default'];
  const ang=p.ang;
  const cosA=Math.cos(ang),sinA=Math.sin(ang);
  const step=p.sz*0.92;
  const alpha=p.hovered?1:0.78;

  // hex → rgb
  const hr=parseInt(p.col.slice(1,3),16);
  const hg=parseInt(p.col.slice(3,5),16);
  const hb=parseInt(p.col.slice(5,7),16);

  for(const[lx,ly,rel] of pattern){
    // 회전 변환
    const rx=lx*cosA - ly*sinA;
    const ry=lx*sinA + ly*cosA;
    const wx=p.x+rx*step;
    const wy=p.y+ry*step;
    const r=Math.max(0.5, rel*p.sz*0.55);
    // 밝기: 중앙일수록 밝게, 끝으로 갈수록 어둡게
    const bright=0.45+rel*0.55;
    ctx.beginPath();ctx.arc(wx,wy,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${Math.round(hr*bright+200*(1-bright))},${Math.round(hg*bright+215*(1-bright))},${Math.round(hb*bright+255*(1-bright))},${(alpha*rel*0.85+0.15).toFixed(2)})`;
    ctx.fill();
  }

  // 호버 시 주변 halo
  if(p.hovered){
    const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz*8);
    gr.addColorStop(0,`rgba(${hr},${hg},${hb},0.12)`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.fillRect(p.x-p.sz*8,p.y-p.sz*8,p.sz*16,p.sz*16);
  }
}

function spawnProbe(planetIdx){
  const list=PROBE_DATA[planetIdx];
  if(!list||!list.length)return;
  const info=list[Math.floor(Math.random()*list.length)];

  const yPos=H*0.2+Math.random()*H*0.55;
  const spd=0.7+Math.random()*0.7;
  const vx=fromLeft?spd:-spd;
  const vy=(Math.random()-0.5)*0.25;
  probes.push({
    x:fromLeft?-80:W+80, y:yPos,
    vx,vy,
    ang:Math.atan2(vy,vx),
    col:info.col,
    name:info.name,
    year:info.year,
    hovered:false,
    sz:2.2+Math.random()*1.2,
    trail:[],
  });
}

    p.trail.push({x:p.x,y:p.y,a:0.28});

    // 호버
    const hx=p.x,hy=p.y;

    const hg=parseInt(p.col.slice(3,5),16);
    const hb=parseInt(p.col.slice(5,7),16);
    for(let t=0;t<p.trail.length;t++){
      const tr=p.trail[t];
      const ratio=t/p.trail.length;
      const ta=(ratio*ratio*0.22).toFixed(2);

      ctx.beginPath();ctx.arc(tr.x,tr.y,r,0,Math.PI*2);

    }
    // 도트 본체
    drawProbeShape(p);
  }
}

function rotY(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c];}
function rotX(x,y,z,a){const c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c];}
function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
const FOV=680,TILT_X=0.40;
const LX=-0.35,LY=0.75,LZ=0.55,LLEN=Math.hypot(LX,LY,LZ);
const lx0=LX/LLEN,ly0=LY/LLEN,lz0=LZ/LLEN;

class Dot3D{
  constructor(ox,oy,oz,col,sz){
    this.ox=ox;this.oy=oy;this.oz=oz;this.col=col;this.sz=sz;
    this.dx=0;this.dy=0;this.vx=0;this.vy=0;
    this.bx=0;this.by=0;this.bvx=0;this.bvy=0;
    this.sx=0;this.sy=0;this.depth=0;this.ps=1;
  }
  project(aY,xOff=0){
    let[x,y,z]=rotY(this.ox,this.oy,this.oz,aY);
    [x,y,z]=rotX(x,y,z,TILT_X);
    this.depth=z;const p=FOV/(FOV+z*0.45);this.ps=p;
    this.sx=cx+xOff+x*p*scale;this.sy=cy+y*p*scale;
  }
  update(){
    if(blastPhase!=='explode'){
      const wx=this.sx+this.dx+this.bx,wy=this.sy+this.dy+this.by;
      const d=Math.hypot(wx-mx,wy-my),R=95;
      if(d<R&&d>0.4){const f=(1-d/R)*(1-d/R)*12;this.vx+=(wx-mx)/d*f;this.vy+=(wy-my)/d*f;}
    }
    this.vx-=this.dx*0.058;this.vy-=this.dy*0.058;this.vx*=0.82;this.vy*=0.82;
    this.dx+=this.vx;this.dy+=this.vy;
    if(blastPhase==='explode'){this.bx+=this.bvx;this.by+=this.bvy;this.bvx*=0.972;this.bvy*=0.972;}
    else if(blastPhase==='reform'){this.bvx+=(-this.bx)*0.048;this.bvy+=(-this.by)*0.048;this.bvx*=0.85;this.bvy*=0.85;this.bx+=this.bvx;this.by+=this.bvy;}
    else{this.bx*=0.88;this.by*=0.88;this.bvx*=0.88;this.bvy*=0.88;}
  }
  draw(){
    ctx.beginPath();ctx.arc(this.sx+this.dx+this.bx,this.sy+this.dy+this.by,Math.max(0.3,this.sz*this.ps),0,Math.PI*2);
    ctx.fillStyle=this.col;ctx.fill();
  }
}

function bodyDot(x,y,z,r,nd,colorFn){
  const nx=x/(r||1),ny=y/(r||1),nz=z/(r||1);
  const diff=Math.max(0,nx*lx0+ny*ly0+nz*lz0);
  return new Dot3D(x,y,z,colorFn(nd,diff,x,y,z),0.65+Math.random()*1.05);
}
function buildPlanet(def){
  const dots=[];const{bodyR:BR,sp:SP,colorFn,rings,emissive}=def;
  for(let z=-BR;z<=BR;z+=SP)for(let y=-BR;y<=BR;y+=SP)for(let x=-BR;x<=BR;x+=SP){
    const r2=x*x+y*y+z*z;if(r2>=BR*BR)continue;
    const r=Math.sqrt(r2),nd=r/BR;
    if(emissive)dots.push(new Dot3D(x,y,z,colorFn(nd,x,y,z),0.7+Math.random()*0.9));
    else dots.push(bodyDot(x,y,z,r,nd,colorFn));
  }
  if(rings)for(const rg of rings){
    const{ri,ro,rsp,plane,col:rc}=rg;
    for(let b=-ro;b<=ro;b+=rsp)for(let a=-ro;a<=ro;a+=rsp){
      const r=Math.sqrt(a*a+b*b);if(r<ri||r>ro)continue;
      const t=(r-ri)/(ro-ri),al=(0.12+Math.sin(t*Math.PI)*0.65).toFixed(2);
      const sz=0.5+Math.random()*0.75,col=rc(t,al);
      if(plane==='xz')dots.push(new Dot3D(a,0,b,col,sz));
      else if(plane==='yz')dots.push(new Dot3D(0,a,b,col,sz));
    }
  }
  return dots;
}

// ─── Web Audio ─────────────────────────────────────────
let audioCtx=null,masterGain=null,soundOn=false;
const ambNodes={};

// [baseHz, filtHz, filtQ, noiseAmt, pulseHz, vol]
const SPROFILES=[
  {hz:52, filt:700, q:1.0, noise:0.22, pulse:0.38, vol:0.52},   // Sun: deep warm
  {hz:138,filt:550, q:2.5, noise:0.06, pulse:0.0,  vol:0.42},   // Mercury: thin
  {hz:78, filt:480, q:3.5, noise:0.16, pulse:0.12, vol:0.45},   // Venus: dense eerie
  {hz:108,filt:1400,q:0.7, noise:0.05, pulse:0.22, vol:0.48},   // Earth: airy
  {hz:64, filt:380, q:4.2, noise:0.24, pulse:0.0,  vol:0.46},   // Mars: wind rumble
  {hz:38, filt:650, q:1.4, noise:0.26, pulse:0.07, vol:0.55},   // Jupiter: massive
  {hz:55, filt:950, q:1.0, noise:0.09, pulse:0.10, vol:0.50},   // Saturn: ethereal
  {hz:92, filt:2200,q:0.5, noise:0.07, pulse:0.0,  vol:0.44},   // Uranus: cold
  {hz:70, filt:1700,q:0.8, noise:0.13, pulse:0.04, vol:0.46},   // Neptune: oceanic
];

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=0;
  masterGain.connect(audioCtx.destination);
}
function buildSound(idx){
  if(!audioCtx||ambNodes[idx])return;
  const p=SPROFILES[idx];
  const gn=audioCtx.createGain();gn.gain.value=0;gn.connect(masterGain);
  // Osc 1
  const o1=audioCtx.createOscillator();o1.type='sine';o1.frequency.value=p.hz;
  const o1g=audioCtx.createGain();o1g.gain.value=0.5;
  const f1=audioCtx.createBiquadFilter();f1.type='lowpass';f1.frequency.value=p.filt;f1.Q.value=p.q;
  o1.connect(f1);f1.connect(o1g);o1g.connect(gn);o1.start();
  // Osc 2 (harmonic)
  const o2=audioCtx.createOscillator();o2.type='triangle';o2.frequency.value=p.hz*1.502;
  const o2g=audioCtx.createGain();o2g.gain.value=0.16;o2.connect(o2g);o2g.connect(gn);o2.start();
  // Noise
  const nodes=[o1,o2];
  if(p.noise>0){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const ns=audioCtx.createBufferSource();ns.buffer=buf;ns.loop=true;
    const nf=audioCtx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=p.filt*0.55;nf.Q.value=0.35;
    const ng=audioCtx.createGain();ng.gain.value=p.noise*0.10;
    ns.connect(nf);nf.connect(ng);ng.connect(gn);ns.start();nodes.push(ns);
  }
  if(p.pulse>0){
    const lfo=audioCtx.createOscillator();lfo.type='sine';lfo.frequency.value=p.pulse;
    const lg=audioCtx.createGain();lg.gain.value=0.14;lfo.connect(lg);lg.connect(o1g.gain);lfo.start();nodes.push(lfo);
  }
  ambNodes[idx]={gn,nodes,vol:p.vol};
}
function crossfade(fromIdx,toIdx){
  if(!audioCtx||!soundOn)return;
  buildSound(toIdx);
  const now=audioCtx.currentTime;
  if(ambNodes[fromIdx])ambNodes[fromIdx].gn.gain.setTargetAtTime(0,now,0.9);
  if(ambNodes[toIdx])ambNodes[toIdx].gn.gain.setTargetAtTime(ambNodes[toIdx].vol,now+0.3,0.7);
}
function activateSound(idx){
  buildSound(idx);
  if(ambNodes[idx])ambNodes[idx].gn.gain.setTargetAtTime(ambNodes[idx].vol,audioCtx.currentTime,1.0);
}
function deactivateAll(){
  for(const k of Object.keys(ambNodes))if(ambNodes[k])ambNodes[k].gn.gain.setTargetAtTime(0,audioCtx.currentTime,0.5);
}
function playWarpSfx(){
  if(!audioCtx||!soundOn)return;
  const t=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const og=audioCtx.createGain();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(160,t);
  osc.frequency.exponentialRampToValueAtTime(2800,t+0.3);
  osc.frequency.exponentialRampToValueAtTime(85,t+0.65);
  og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(0.14,t+0.1);og.gain.exponentialRampToValueAtTime(0.001,t+0.68);
  const flt=audioCtx.createBiquadFilter();flt.type='bandpass';flt.frequency.value=1000;flt.Q.value=0.6;
  osc.connect(flt);flt.connect(og);og.connect(audioCtx.destination);
  osc.start(t);osc.stop(t+0.7);
}

soundBtn.addEventListener('click',()=>{

const DSORT=(a,b)=>a.depth-b.depth;
let angleY=0;
let bgR=PLANETS[currentIdx].bgTint[0],bgG=PLANETS[currentIdx].bgTint[1],bgB=PLANETS[currentIdx].bgTint[2];

function drawPlanetSet(dots,xOff,isE,isS,isJ,isMars,isUranus,isNeptune){
  for(const d of dots)d.project(angleY,xOff);
  if(isE){for(const s of satellites)s.dot.project(angleY,xOff);for(const md of moonDots)md.dot.project(angleY,xOff);}
  if(isS)for(const m of saturnMoons)for(const md of m.moonDots)md.dot.project(angleY,xOff);
  if(isJ)for(const m of jupiterMoons)for(const md of m.moonDots)md.dot.project(angleY,xOff);
  if(isMars)for(const m of marsMoons)for(const md of m.mDots)md.dot.project(angleY,xOff);
  if(isUranus)for(const m of uranusMoons)for(const md of m.mDots)md.dot.project(angleY,xOff);
  if(isNeptune)for(const m of neptuneMoons)for(const md of m.mDots)md.dot.project(angleY,xOff);
  let all=[...dots];
  if(isE)all=[...all,...satellites.map(s=>s.dot),...moonDots.map(md=>md.dot)];
  if(isS)all=[...all,...saturnMoons.flatMap(m=>m.moonDots.map(md=>md.dot))];
  if(isJ)all=[...all,...jupiterMoons.flatMap(m=>m.moonDots.map(md=>md.dot))];
  if(isMars)all=[...all,...marsMoons.flatMap(m=>m.mDots.map(md=>md.dot))];
  if(isUranus)all=[...all,...uranusMoons.flatMap(m=>m.mDots.map(md=>md.dot))];
  if(isNeptune)all=[...all,...neptuneMoons.flatMap(m=>m.mDots.map(md=>md.dot))];
  all.sort(DSORT);for(const d of all){d.update();d.draw();}
}
function drawGlow(idx,alpha=1){
  const[r,g,b,si,so,a]=GLOWS[idx];
  const ga=ctx.createRadialGradient(cx,cy,0,cx,cy,so*scale);
  ga.addColorStop(0,`rgba(${r},${g},${b},${(a*alpha).toFixed(3)})`);
  ga.addColorStop(0.35,`rgba(${r},${g},${b},${(a*alpha*0.4).toFixed(3)})`);
  ga.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ga;ctx.fillRect(0,0,W,H);
}
// 프로미넌스(홍염) 사전 생성
const PROMINENCES=Array.from({length:6},(_,i)=>({
  ang:   (i/6)*Math.PI*2+Math.random()*0.5,
  h:     0.26+Math.random()*0.28,   // 최대 높이 (sunR 배율)
  w:     0.07+Math.random()*0.06,   // 아치 좌우 폭 (rad)
  spd:   0.006+Math.random()*0.008, // 자전 속도
  cycle: 6.0+Math.random()*5.0,     // 한쪽→반대쪽 이동 주기
  phase: Math.random()*Math.PI*2,
  thick: 2+Math.floor(Math.random()*3), // 두께 레이어 수
}));

function drawSunCorona(){
  const t=Date.now()*0.001;
  const sunR=PLANETS[0].bodyR*scale;

  function sunColor(nd, diff, alpha){
    const L=Math.round(58+(1-nd)*37);
    const sat=Math.round(85-nd*35);
    const hue=Math.round(22+nd*22);
    const lb=Math.round(L*(0.55+diff*0.45));
    return`hsla(${hue},${sat}%,${lb}%,${alpha.toFixed(2)})`;
  }

  const DOT_MIN=0.55, DOT_MAX=1.5;
  const DOTS_ALONG=38; // 아치 방향 도트 수 (조밀)

  ctx.save();
  for(const p of PROMINENCES){
    const ang=p.ang+t*p.spd;
    const maxH=p.h*sunR;

    // progress: 0→1 선형 루프 (한쪽 라인 → 반대쪽 라인)
    const rawT=((t/p.cycle+p.phase/(Math.PI*2))%1+1)%1; // 0~1 주기
    // 전체 진행 중 앞/뒤 5% 구간은 fade (출발·도착 시 표면으로 자연스럽게)
    const progress=rawT; // 0=왼쪽 출발, 1=오른쪽 도착

    // 각 도트는 progress에 따라 아치 위 특정 위치에 집중
    // → 도트 묶음이 왼쪽에서 솟아 정점을 거쳐 오른쪽으로 흐르는 흐름
    // 전체 아치(u=0~1)에 도트를 고르게 배치하되
    // 가시 alpha를 progress 위치 중심으로 가우시안으로 집중

    for(let layer=0;layer<p.thick;layer++){
      const layerOff=(layer-(p.thick-1)/2)*0.012; // 두께 방향 각도 오프셋
      const layerAngBase=ang+layerOff;

      for(let k=0;k<DOTS_ALONG;k++){
        const u=k/(DOTS_ALONG-1); // 0(왼쪽 출발) → 1(오른쪽 도착)

        // 아치 각도: 왼쪽(ang-w) → 오른쪽(ang+w)
        const archAng=layerAngBase - p.w + u*p.w*2;

        // 높이: sin 커브 (양 끝=표면, 중간=최대)
        const archH=Math.sin(u*Math.PI)*maxH;

        // 위치
        const rx=cx+Math.cos(archAng)*(sunR+archH);
        const ry=cy+Math.sin(archAng)*(sunR+archH);

        // 흐름 alpha: progress 위치 중심으로 가우시안 집중
        // sigma=0.18 → 아치의 약 1/3 구간이 밝게 보임
        const sigma=0.22;
        const gauss=Math.exp(-0.5*((u-progress)/sigma)**2);

        // 전체 fade: 아치 시작(progress≈0)과 끝(progress≈1)에서 부드럽게
        const edgeFade=Math.sin(progress*Math.PI); // 0→1→0
        const finalAlpha=gauss*edgeFade*0.88;
        if(finalAlpha<0.015) continue;

        // 색상: 높이에 따라
        const heightRatio=archH/maxH;
        const nd=Math.max(0,0.28-heightRatio*0.22);
        const diff=0.38+heightRatio*0.55;
        const sz=DOT_MIN+(DOT_MAX-DOT_MIN)*Math.sin(u*Math.PI)*gauss*edgeFade;

        ctx.beginPath();
        ctx.arc(rx,ry,Math.max(0.35,sz),0,Math.PI*2);
        ctx.fillStyle=sunColor(nd,diff,finalAlpha);
        ctx.fill();
      }
    }
  }
  ctx.restore();
}

function frame(){
  requestAnimationFrame(frame);
  // 자동 자전 + 손 회전 합산
  angleY+=0.0038+camRotDelta;
  // 손 회전 관성 감속
  camRotDelta*=0.78;
  if(Math.abs(camRotDelta)<0.0001)camRotDelta=0;

  if(camTargetScale!==null){scale+=(camTargetScale-scale)*0.10;scrollScale=scale;}

  // Lerp bg tint toward target planet
  const tgt=PLANETS[trans.active?trans.toIdx:currentIdx].bgTint;
  bgR+=(tgt[0]-bgR)*0.02;bgG+=(tgt[1]-bgG)*0.02;bgB+=(tgt[2]-bgB)*0.02;

  ctx.fillStyle='#00000e';ctx.fillRect(0,0,W,H);

  // Nebula with dynamic planet-tinted glow
  const nb=ctx.createRadialGradient(cx,cy*0.82,0,cx,cy,340*scale);
  nb.addColorStop(0,`rgba(${Math.round(bgR)},${Math.round(bgG)},${Math.round(bgB)},0.14)`);
  nb.addColorStop(0.45,`rgba(${Math.round(bgR*0.4)},${Math.round(bgG*0.4)},${Math.round(bgB*0.4)},0.04)`);
  nb.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=nb;ctx.fillRect(0,0,W,H);
  // Base purple nebula
  const nb2=ctx.createRadialGradient(cx,cy*0.85,0,cx,cy,270*scale);
  nb2.addColorStop(0,'rgba(38,22,68,0.065)');nb2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=nb2;ctx.fillRect(0,0,W,H);

  // Stars
  for(const s of stars){
    s.a+=s.da;
    if(s.a>s.hi){s.a=s.hi;s.da=-Math.abs(s.da);}if(s.a<s.lo){s.a=s.lo;s.da=Math.abs(s.da);}
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a.toFixed(2)})`;ctx.fill();
  }

  // Shooting stars (기존 배경 유성)
  spawnShoots();
  for(let i=shoots.length-1;i>=0;i--){
    const s=shoots[i];s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
    if(s.life<=0||s.x>W+80||s.y>H+80){shoots.splice(i,1);continue;}
    const spd=Math.hypot(s.vx,s.vy);
    const tx=s.x-(s.vx/spd)*s.len,ty=s.y-(s.vy/spd)*s.len;
    const gr=ctx.createLinearGradient(s.x,s.y,tx,ty);
    gr.addColorStop(0,`rgba(255,255,255,${(s.life*0.95).toFixed(2)})`);
    gr.addColorStop(0.5,`rgba(200,210,255,${(s.life*0.4).toFixed(2)})`);
    gr.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(tx,ty);
    ctx.strokeStyle=gr;ctx.lineWidth=1.6*s.life;ctx.stroke();
  }

  // Meteor Shower
  tickMeteorShower(16);
  drawMeteors();

  if(trans.active){
    drawGlow(currentIdx,1-easeInOut(trans.t));drawGlow(trans.toIdx,easeInOut(trans.t));
  }else{
    drawGlow(currentIdx);if(PLANETS[currentIdx].isSun)drawSunCorona();
  }

  if(currentIdx===EARTH_IDX||(trans.active&&(trans.fromDots===planetCache[EARTH_IDX]||trans.toDots===planetCache[EARTH_IDX]))){updateSatellites();updateMoon();}
  if(currentIdx===MARS_IDX||(trans.active&&(trans.fromDots===planetCache[MARS_IDX]||trans.toDots===planetCache[MARS_IDX])))updateMarsMoons();
  if(currentIdx===SATURN_IDX||(trans.active&&(trans.fromDots===planetCache[SATURN_IDX]||trans.toDots===planetCache[SATURN_IDX])))updateSaturnMoons();
  if(currentIdx===JUPITER_IDX||(trans.active&&(trans.fromDots===planetCache[JUPITER_IDX]||trans.toDots===planetCache[JUPITER_IDX])))updateJupiterMoons();
  if(currentIdx===URANUS_IDX||(trans.active&&(trans.fromDots===planetCache[URANUS_IDX]||trans.toDots===planetCache[URANUS_IDX])))updateUranusMoons();
  if(currentIdx===NEPTUNE_IDX||(trans.active&&(trans.fromDots===planetCache[NEPTUNE_IDX]||trans.toDots===planetCache[NEPTUNE_IDX])))updateNeptuneMoons();

  if(trans.active){
    trans.t=Math.min(1,trans.t+0.028);
    const e=easeInOut(trans.t);
    const fromOff=-trans.dir*e*W,toOff=trans.dir*(1-e)*W;
    const fE=trans.fromDots===planetCache[EARTH_IDX],fS=trans.fromDots===planetCache[SATURN_IDX],fJ=trans.fromDots===planetCache[JUPITER_IDX];
    const tE=trans.toDots===planetCache[EARTH_IDX],tS=trans.toDots===planetCache[SATURN_IDX],tJ=trans.toDots===planetCache[JUPITER_IDX];
    const fMars=trans.fromDots===planetCache[MARS_IDX],tMars=trans.toDots===planetCache[MARS_IDX];
    const fUr=trans.fromDots===planetCache[URANUS_IDX],tUr=trans.toDots===planetCache[URANUS_IDX];
    const fNep=trans.fromDots===planetCache[NEPTUNE_IDX],tNep=trans.toDots===planetCache[NEPTUNE_IDX];
    drawPlanetSet(trans.fromDots,fromOff,fE,fS,fJ,fMars,fUr,fNep);
    drawPlanetSet(trans.toDots,toOff,tE,tS,tJ,tMars,tUr,tNep);
    if(trans.t>=1){currentDots=trans.toDots;currentIdx=trans.toIdx;trans.active=false;}
  }else{
    const isMars=currentIdx===MARS_IDX,isUr=currentIdx===URANUS_IDX,isNep=currentIdx===NEPTUNE_IDX;
    drawPlanetSet(currentDots,0,currentIdx===EARTH_IDX,currentIdx===SATURN_IDX,currentIdx===JUPITER_IDX,isMars,isUr,isNep);
  }

  if(blastFlash>0){ctx.fillStyle=`rgba(255,200,80,${blastFlash.toFixed(3)})`;ctx.fillRect(0,0,W,H);blastFlash=Math.max(0,blastFlash-0.035);}

  // Probe flyby
  updateProbes(16);
  drawProbes();

  // ʻOumuamua (태양 뷰)
  tickMainOumu();
  // Comet ISON (태양 뷰)
  tickMainIson();

  if(mx>0&&mx<W&&my>0&&my<H){
    const cg=ctx.createRadialGradient(mx,my,0,mx,my,52);
    cg.addColorStop(0,'rgba(180,200,255,0.11)');cg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);
    ctx.beginPath();ctx.arc(mx,my,2.2,0,Math.PI*2);ctx.fillStyle='rgba(200,215,255,0.6)';ctx.fill();
  }
  if(!trans.active){
    const hR=(PLANETS[currentIdx].bodyR+30)*scale*1.4,dist=Math.hypot(mx-cx,my-cy);
    setPopupVisible(mx>0&&dist<hR);
  }else setPopupVisible(false);
}


// ─── ʻOumuamua (메인 태양 뷰) ──────────────────────────
// 태양 페이지에서 2분마다, 첫 진입 시 즉시 등장
// 실제 경로: 상단 좌측 진입 → 태양 근접 통과 → 하단 우측 이탈
const OUMU_MAIN_INTERVAL = 5000;
let oumuMain = null;
let oumuMainTimer = -1; // -1 = 첫 등장 대기 (태양 진입 시 즉시)

// 도트 형태: 길쭉한 시가형 (인트로와 동일한 패턴, 메인용 스케일)
const OUMU_MAIN_DOTS = [];
for(let lx=-5.5;lx<=5.5;lx+=0.85){
  const wr=Math.max(0.18, 0.65-Math.abs(lx)*0.09);
  for(let ly=-wr;ly<=wr;ly+=0.5){
    const nd=Math.hypot(lx/5.5, ly/wr);
    if(nd>1) continue;
    const bright=0.55+(1-nd)*0.45;
    OUMU_MAIN_DOTS.push({lx,ly,bright,sz:0.6+Math.random()*0.6});
  }
}

function spawnMainOumu(){
  // 화면 밖 좌상단 진입 → cx,cy 근처 태양 통과 → 우하단 이탈
  oumuMain = {
    t:0, spd:0.0022, trail:[], done:false, shown:false
  };
}

function getOumuMainPos(t){
  // 쌍곡선 경로: 좌상 → 태양 옆 → 우하
  const sx=cx-W*0.52, sy=cy-H*0.48;
  const ex=cx+W*0.52, ey=cy+H*0.48;
  const cpx=cx-W*0.08, cpy=cy-H*0.12; // 태양 약간 위쪽 꺾임
  const mt=1-t;
  return {
    x: mt*mt*sx + 2*mt*t*cpx + t*t*ex,
    y: mt*mt*sy + 2*mt*t*cpy + t*t*ey,
  };
}

function drawOumuMain(x, y, ang, alpha){
  const cosA=Math.cos(ang), sinA=Math.sin(ang);
  const sc=3.5;
  for(const d of OUMU_MAIN_DOTS){
    const rx=d.lx*cosA - d.ly*sinA;
    const ry=d.lx*sinA + d.ly*cosA;
    const wx=x+rx*sc, wy=y+ry*sc;
    const a=(alpha*d.bright).toFixed(2);
    ctx.beginPath(); ctx.arc(wx,wy,Math.max(0.3,d.sz),0,Math.PI*2);
    ctx.fillStyle=`rgba(${Math.round(215+d.bright*40)},${Math.round(235+d.bright*20)},${Math.round(185+d.bright*35)},${a})`;
    ctx.fill();
  }
  // 중심 glow
  const g=ctx.createRadialGradient(x,y,0,x,y,18*scale);
  g.addColorStop(0,`rgba(220,245,190,${(alpha*0.20).toFixed(2)})`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(x-18*scale,y-18*scale,36*scale,36*scale);
}

function tickMainOumu(){
  if(!PLANETS[currentIdx].isSun) return; // 태양 뷰에서만
  // 첫 진입 감지
  if(oumuMainTimer===-1){ oumuMainTimer=0; spawnMainOumu(); return; }

  if(!oumuMain){
    oumuMainTimer+=16;
    if(oumuMainTimer>=OUMU_MAIN_INTERVAL){ oumuMainTimer=0; spawnMainOumu(); }
    return;
  }
  if(oumuMain.done) return;

  oumuMain.t=Math.min(1, oumuMain.t+oumuMain.spd);
  const pos=getOumuMainPos(oumuMain.t);

  oumuMain.trail.push({x:pos.x,y:pos.y});
  if(oumuMain.trail.length>60) oumuMain.trail.shift();

  const dt=Math.min(1,oumuMain.t+0.01);
  const pos2=getOumuMainPos(dt);
  const ang=Math.atan2(pos2.y-pos.y,pos2.x-pos.x);

  if(!oumuMain.shown && oumuMain.t>0.35 && oumuMain.t<0.55){
    oumuMain.shown=true;
    showEventToast('☄️  ʻOumuamua — 태양계 통과');
  }

  // 트레일
  for(let i=0;i<oumuMain.trail.length;i++){
    const tr=oumuMain.trail[i];
    const ratio=i/oumuMain.trail.length;
    const ta=(ratio*ratio*0.38).toFixed(2);
    ctx.beginPath(); ctx.arc(tr.x,tr.y,0.7+ratio*1.1,0,Math.PI*2);
    ctx.fillStyle=`rgba(195,240,170,${ta})`; ctx.fill();
  }

  const fadeIn=oumuMain.t<0.04?oumuMain.t/0.04:1;
  const fadeOut=oumuMain.t>0.93?(1-oumuMain.t)/0.07:1;
  drawOumuMain(pos.x,pos.y,ang,fadeIn*fadeOut*0.90);

  if(oumuMain.t>=1){
    oumuMain.done=true;
    oumuMainTimer=0;
    oumuMain=null;
  }
}

// ─── Comet ISON (메인 태양 뷰) ──────────────────────────
// 2013년 실제 경로: 우상단→태양 극근접(거의 스침)→좌하단
const ISON_MAIN_INTERVAL = 5000;
let isonMain = null;
let isonMainTimer = -2; // -2 = 아직 태양 미진입 (오우무아무아와 엇갈리게)

function spawnMainIson(){
  isonMain = {t:0, spd:0.0018, trail:[], dustTrail:[], done:false, shown:false};
}

function getIsonMainPos(t){
  // 우상단 → 태양 극근접(cx+20, cy-15) → 좌하단
  const sx=cx+W*0.50, sy=cy-H*0.46;
  const ex=cx-W*0.52, ey=cy+H*0.48;
  const cpx=cx+W*0.04, cpy=cy-H*0.04; // 태양 아주 가까이
  const mt=1-t;
  return {x:mt*mt*sx+2*mt*t*cpx+t*t*ex, y:mt*mt*sy+2*mt*t*cpy+t*t*ey};
}

// ISON 핵: 오우무아무아보다 더 둥근 편
const ISON_NUCLEUS = [];
for(let y=-3;y<=3;y+=0.7) for(let x=-3;x<=3;x+=0.7){
  const nd=Math.hypot(x/3,y/3); if(nd>1) continue;
  ISON_NUCLEUS.push({lx:x,ly:y,nd,sz:0.55+Math.random()*0.65});
}

function drawIsonMain(x,y,ang,alpha,t){
  // 꼬리 방향: 태양 반대 방향 (진행방향의 ~180°에서 약간 틀어짐)
  const tailAng = ang + Math.PI + 0.18; // 약간 곡선
  const tailLen = 80 + t*120; // 태양 근접할수록 꼬리 길어짐
  const nearSun = Math.max(0, 1-Math.abs(t-0.48)/0.22); // 태양 근접 시 강조

  // 이온 꼬리 (청백색, 직선에 가까움)
  for(let i=0;i<28;i++){
    const ratio=i/27;
    const tx2=x+Math.cos(tailAng)*tailLen*ratio;
    const ty2=y+Math.sin(tailAng)*tailLen*ratio;
    const ta=(alpha*(1-ratio)*(0.45+nearSun*0.3)).toFixed(2);
    ctx.beginPath(); ctx.arc(tx2,ty2,Math.max(0.3,(1.4-ratio*1.1)),0,Math.PI*2);
    ctx.fillStyle=`rgba(180,220,255,${ta})`; ctx.fill();
  }

  // 먼지 꼬리 (황금빛, 약간 퍼짐)
  const dustAng = tailAng - 0.22;
  for(let i=0;i<22;i++){
    const ratio=i/21;
    const spread=(Math.random()-0.5)*12*ratio;
    const tx2=x+Math.cos(dustAng)*tailLen*0.85*ratio + Math.cos(dustAng+Math.PI/2)*spread;
    const ty2=y+Math.sin(dustAng)*tailLen*0.85*ratio + Math.sin(dustAng+Math.PI/2)*spread;
    const ta=(alpha*(1-ratio)*(0.35+nearSun*0.2)).toFixed(2);
    ctx.beginPath(); ctx.arc(tx2,ty2,Math.max(0.3,1.2-ratio*0.9),0,Math.PI*2);
    ctx.fillStyle=`rgba(255,220,120,${ta})`; ctx.fill();
  }

  // 핵 도트
  for(const d of ISON_NUCLEUS){
    const wx=x+d.lx*3.2, wy=y+d.ly*3.2;
    const bright=0.6+(1-d.nd)*0.4;
    const a=(alpha*bright*(1+nearSun*0.4)).toFixed(2);
    ctx.beginPath(); ctx.arc(wx,wy,Math.max(0.3,d.sz*(1+nearSun*0.3)),0,Math.PI*2);
    ctx.fillStyle=`rgba(${Math.round(200+bright*55)},${Math.round(230+bright*25)},255,${a})`;
    ctx.fill();
  }
  // 코마 glow
  const glowR=(14+nearSun*22)*scale;
  const g=ctx.createRadialGradient(x,y,0,x,y,glowR);
  g.addColorStop(0,`rgba(180,220,255,${(alpha*(0.22+nearSun*0.18)).toFixed(2)})`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(x-glowR,y-glowR,glowR*2,glowR*2);
}

function tickMainIson(){
  if(!PLANETS[currentIdx].isSun) return;
  if(isonMainTimer===-2){ isonMainTimer=2600; return; }
  if(!isonMain){
    isonMainTimer+=16;
    if(isonMainTimer>=ISON_MAIN_INTERVAL){ isonMainTimer=0; spawnMainIson(); }
    return;
  }
  if(isonMain.done) return;

  isonMain.t=Math.min(1,isonMain.t+isonMain.spd);
  const pos=getIsonMainPos(isonMain.t);
  const dt=Math.min(1,isonMain.t+0.01);
  const pos2=getIsonMainPos(dt);
  const ang=Math.atan2(pos2.y-pos.y,pos2.x-pos.x);

  // 태양 근접도 (t=0.48 최고조)
  const nearSunRaw=Math.max(0,1-Math.abs(isonMain.t-0.48)/0.18);
  // 소멸 진행도 (t=0.50~0.62 구간에서 0→1)
  const disinT=Math.max(0,Math.min(1,(isonMain.t-0.50)/0.12));
  const alive=1-disinT; // 생존율

  // 소멸 파티클 스폰
  if(!isonMain.particles) isonMain.particles=[];
  if(disinT>0 && disinT<0.95){
    const spawnCount=Math.floor(nearSunRaw*3+1);
    for(let i=0;i<spawnCount;i++){
      const a2=Math.random()*Math.PI*2;
      const spd=1.5+Math.random()*3.5;
      const col=Math.random()<0.5
        ?`rgba(255,${Math.round(150+Math.random()*80)},50`   // 주황/적열
        :`rgba(255,${Math.round(200+Math.random()*55)},120`; // 황백열
      isonMain.particles.push({
        x:pos.x,y:pos.y,
        vx:Math.cos(a2)*spd,vy:Math.sin(a2)*spd,
        life:1,decay:0.018+Math.random()*0.025,
        sz:0.6+Math.random()*1.2,col,
      });
    }
  }

  // 소멸 플래시 (t≈0.52)
  if(!isonMain.flashDone && isonMain.t>0.52){
    isonMain.flashDone=true;
    showEventToast('💥  Comet ISON — 태양열에 의해 소멸');
    // 화면 플래시
    ctx.fillStyle='rgba(255,220,120,0.18)';
    ctx.fillRect(0,0,W,H);
  }

  // 파티클 업데이트·렌더
  for(let i=isonMain.particles.length-1;i>=0;i--){
    const p=isonMain.particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.96; p.vy*=0.96;
    p.life-=p.decay;
    if(p.life<=0){isonMain.particles.splice(i,1);continue;}
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.2,p.sz*p.life),0,Math.PI*2);
    ctx.fillStyle=`${p.col},${(p.life*0.85).toFixed(2)})`; ctx.fill();
  }

  // 트레일 (소멸되면서 희미해짐)
  isonMain.trail.push({x:pos.x,y:pos.y});
  if(isonMain.trail.length>45) isonMain.trail.shift();
  for(let i=0;i<isonMain.trail.length;i++){
    const tr=isonMain.trail[i];
    const ratio=i/isonMain.trail.length;
    const ta=(ratio*ratio*0.28*alive).toFixed(2);
    ctx.beginPath(); ctx.arc(tr.x,tr.y,0.6+ratio*0.9,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,220,255,${ta})`; ctx.fill();
  }

  if(!isonMain.shown&&isonMain.t>0.38&&isonMain.t<0.50){
    isonMain.shown=true;
    showEventToast('🌠  Comet ISON — 태양 근접 통과');
  }

  // 혜성 본체 — 소멸 구간에서 점점 사라짐
  if(alive>0.02){
    const fi=isonMain.t<0.04?isonMain.t/0.04:1;
    drawIsonMain(pos.x,pos.y,ang,fi*alive*0.88,isonMain.t);
  }

  // 소멸 후 잔여 파티클만 남은 경우 종료
  if(isonMain.t>=1 && isonMain.particles.length===0){
    isonMain.done=true; isonMainTimer=0; isonMain=null;
  } else if(isonMain.t>=1){
    // 파티클 소진까지 대기
  }
}

// ─── Intro System ───────────────────────────────────────
(function(){
  const introEl    = document.getElementById('intro');
  const introC     = document.getElementById('intro-c');
  const ic         = introC.getContext('2d');
  const flashEl    = document.getElementById('intro-flash');
  const labelEl    = document.getElementById('intro-label');
  let   iW, iH;    // 인트로 캔버스 크기

  // 메인 UI 표시/숨김
  function showMainUI(){
    document.querySelectorAll('.main-ui').forEach(el=>{
      el.classList.remove('hidden');
    });
  }

  // 캔버스 리사이즈
  function resizeIC(){
    iW = introC.width  = innerWidth;
    iH = introC.height = innerHeight;
  }
  resizeIC();
  window.addEventListener('resize', resizeIC);

  // ── 인트로 전용 별 ──
  const iStars = Array.from({length:600},()=>({
    x:Math.random(), y:Math.random(),
    r:Math.random()<0.07 ? Math.random()*1.6+0.7 : Math.random()*0.5+0.1,
    a:Math.random()*0.5+0.05,
    da:(Math.random()*0.006+0.002)*(Math.random()<.5?1:-1),
    lo:0.04+Math.random()*0.07, hi:0.18+Math.random()*0.5
  }));

  // ── 태양계 레이아웃 정의 ──
  // 화면 중앙 = 태양, 각 행성은 타원 궤도
  // rx/ry = 화면 비율 (0~1), ph = 초기 각도, spd = 공전 속도배율
  const LAYOUT = [
    {rx:0,    ry:0,    ph:0,   spd:0   }, // 0 태양
    {rx:0.09, ry:0.038,ph:0.8, spd:3.0 }, // 1 수성
    {rx:0.155,ry:0.065,ph:2.2, spd:2.1 }, // 2 금성
    {rx:0.215,ry:0.092,ph:3.7, spd:1.6 }, // 3 지구
    {rx:0.278,ry:0.118,ph:1.1, spd:1.2 }, // 4 화성
    {rx:0.360,ry:0.158,ph:4.4, spd:0.72}, // 5 목성
    {rx:0.440,ry:0.195,ph:0.4, spd:0.50}, // 6 토성
    {rx:0.510,ry:0.225,ph:2.7, spd:0.35}, // 7 천왕성
    {rx:0.572,ry:0.250,ph:5.0, spd:0.22}, // 8 해왕성
  ];

  // 인트로 행성 반지름 (px) — 실제 bodyR 비율 유지하되 화면에 맞게 축소
  // 태양 bodyR=115 기준으로 비율 계산, 화면 짧은 쪽의 약 3.8%를 태양으로
  function getIntroRadii(){
    const base = Math.min(iW,iH)*0.038;
    const scale = base/115;
    return PLANETS.map(p=>Math.max(3, p.bodyR*scale));
  }

  // 인트로 전용 행성 도트 캐시 (buildPlanet 그대로 — 축소 sp만 조정)
  const introCache = {};
  function getIntroDots(idx){
    if(introCache[idx]) return introCache[idx];
    const radii = getIntroRadii();
    const r = radii[idx];
    const orig = PLANETS[idx];
    // sp(간격)을 반지름 비율로 조정
    const ratio = r / orig.bodyR;
    const def = Object.assign({}, orig, {
      bodyR: r,
      sp: Math.max(1.2, orig.sp * ratio)
    });
    introCache[idx] = buildPlanet(def);
    return introCache[idx];
  }

  // 행성 현재 화면 위치
  const iPos = LAYOUT.map(()=>({x:0,y:0}));
  let   iAngle = 0;
  let   iHover = -1;

  // ── ʻOumuamua (인트로) ──────────────────────────────────
  // 실제 경로: 북서쪽 진입 → 태양(중앙) 근접 통과 → 남동쪽 이탈
  // 쌍곡선 경로를 베지어 커브로 근사
  const OUMU_INTERVAL = 5000; // 5초
  let ioumu = null;      // 현재 오우무아무아 상태
  let ioumuTimer = 0;    // 다음 등장까지 타이머 (0이면 즉시)

  function spawnIntroOumu(){
    // 경로: 좌상단 진입 → 태양 근처 꺾임 → 우하단 이탈
    // 베지어 P0→P1(컨트롤)→P2 경로
    ioumu = {
      t: 0,
      spd: 0.0028,   // 경로 진행 속도
      trail: [],
      done: false,
      shown: false,  // 토스트 표시 여부
    };
  }

  function getOumuIntroPos(t, cw, ch){
    // 쌍곡선 경로 근사: 좌상단→태양 근접→우하단
    const sx = cw*0.05, sy = ch*0.08;   // 시작: 좌상단
    const ex = cw*0.95, ey = ch*0.92;   // 끝: 우하단
    const cpx= cw*0.42, cpy= ch*0.30;   // 컨트롤: 태양 근처 위쪽
    // 2차 베지어
    const mt=1-t;
    return {
      x: mt*mt*sx + 2*mt*t*cpx + t*t*ex,
      y: mt*mt*sy + 2*mt*t*cpy + t*t*ey,
    };
  }

  // 도트 패턴: 홀쭉하고 긴 시가 형태 (실제 오우무아무아 형태)
  // 길이:폭 = 10:1 비율
  const OUMU_DOTS_LOCAL = [];
  for(let lx=-5.5;lx<=5.5;lx+=0.9){
    const wr = Math.max(0.2, 0.7 - Math.abs(lx)*0.1);
    for(let ly=-wr;ly<=wr;ly+=0.55){
      const nd = Math.hypot(lx/5.5, ly/wr);
      if(nd>1) continue;
      const bright = 0.55 + (1-nd)*0.45;
      OUMU_DOTS_LOCAL.push({lx, ly, bright, sz: 0.55+Math.random()*0.55});
    }
  }

  function drawOumuIntro(x, y, ang, alpha){
    const cosA=Math.cos(ang), sinA=Math.sin(ang);
    const scale=2.8;
    for(const d of OUMU_DOTS_LOCAL){
      const rx = d.lx*cosA - d.ly*sinA;
      const ry = d.lx*sinA + d.ly*cosA;
      const wx = x + rx*scale, wy = y + ry*scale;
      const a = (alpha * d.bright).toFixed(2);
      ic.beginPath(); ic.arc(wx, wy, Math.max(0.3, d.sz), 0, Math.PI*2);
      ic.fillStyle = `rgba(${Math.round(210+d.bright*45)},${Math.round(230+d.bright*25)},${Math.round(180+d.bright*30)},${a})`;
      ic.fill();
    }
    // 중심 glow
    const g=ic.createRadialGradient(x,y,0,x,y,14);
    g.addColorStop(0,`rgba(230,245,200,${(alpha*0.18).toFixed(2)})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ic.fillStyle=g; ic.fillRect(x-14,y-14,28,28);
  }

  function tickOumuIntro(cw, ch){
    // 타이머 (첫 진입은 즉시이므로 0으로 시작)
    if(!ioumu){
      ioumuTimer += 16;
      if(ioumuTimer >= OUMU_INTERVAL) spawnIntroOumu();
      return;
    }
    if(ioumu.done) return;

    ioumu.t = Math.min(1, ioumu.t + ioumu.spd);
    const pos = getOumuIntroPos(ioumu.t, cw, ch);

    // 트레일
    ioumu.trail.push({x:pos.x, y:pos.y});
    if(ioumu.trail.length > 55) ioumu.trail.shift();

    // 진행 방향 각도
    const dt = Math.min(1, ioumu.t + 0.01);
    const pos2 = getOumuIntroPos(dt, cw, ch);
    const ang = Math.atan2(pos2.y-pos.y, pos2.x-pos.x);

    // 태양 통과 시 토스트
    if(!ioumu.shown && ioumu.t > 0.28 && ioumu.t < 0.45){
      ioumu.shown = true;
      showEventToast('☄️  ʻOumuamua — 성간 천체 통과 중');
    }

    // 트레일 그리기
    for(let i=0;i<ioumu.trail.length;i++){
      const tr=ioumu.trail[i];
      const ratio=i/ioumu.trail.length;
      const ta=(ratio*ratio*0.35).toFixed(2);
      ic.beginPath(); ic.arc(tr.x, tr.y, 0.8+ratio*0.8, 0, Math.PI*2);
      ic.fillStyle=`rgba(200,240,180,${ta})`; ic.fill();
    }

    // 본체
    const fadeIn  = ioumu.t < 0.05 ? ioumu.t/0.05 : 1;
    const fadeOut = ioumu.t > 0.92 ? (1-ioumu.t)/0.08 : 1;
    drawOumuIntro(pos.x, pos.y, ang, fadeIn*fadeOut*0.92);

    if(ioumu.t >= 1){
      ioumu.done = true;
      ioumuTimer = 0;
      ioumu = null;
    }
  }
  // 첫 진입 즉시 등장
  spawnIntroOumu();

  // ── Comet ISON (인트로) ──────────────────────────────────
  const ISON_INTERVAL = 5000;
  let iison = null;
  let iisonTimer = 2800; // 오우무아무아와 엇갈려 등장

  function spawnIntroIson(){
    iison = {t:0, spd:0.0022, trail:[], done:false, shown:false};
  }
  function getIsonIntroPos(t, cw, ch){
    const sx=cw*0.94, sy=ch*0.06;
    const ex=cw*0.06, ey=ch*0.94;
    const cpx=cw*0.50, cpy=ch*0.44;
    const mt=1-t;
    return {x:mt*mt*sx+2*mt*t*cpx+t*t*ex, y:mt*mt*sy+2*mt*t*cpy+t*t*ey};
  }
  const ISON_INTRO_NUCLEUS=[];
  for(let ny=-2.5;ny<=2.5;ny+=0.65) for(let nx=-2.5;nx<=2.5;nx+=0.65){
    const nd=Math.hypot(nx/2.5,ny/2.5); if(nd>1) continue;
    ISON_INTRO_NUCLEUS.push({lx:nx,ly:ny,nd,sz:0.45+Math.random()*0.55});
  }
  function drawIsonIntro(x,y,ang,alpha,t){
    const tailAng=ang+Math.PI+0.15;
    const tailLen=55+t*90;
    const nearSun=Math.max(0,1-Math.abs(t-0.50)/0.20);
    for(let i=0;i<22;i++){
      const ratio=i/21;
      const ta=(alpha*(1-ratio)*(0.42+nearSun*0.28)).toFixed(2);
      ic.beginPath();
      ic.arc(x+Math.cos(tailAng)*tailLen*ratio,y+Math.sin(tailAng)*tailLen*ratio,
             Math.max(0.3,1.2-ratio*0.9),0,Math.PI*2);
      ic.fillStyle=`rgba(170,215,255,${ta})`; ic.fill();
    }
    const dustAng=tailAng-0.20;
    for(let i=0;i<16;i++){
      const ratio=i/15;
      const spread=(Math.random()-0.5)*9*ratio;
      ic.beginPath();
      ic.arc(x+Math.cos(dustAng)*tailLen*0.8*ratio+Math.cos(dustAng+Math.PI/2)*spread,
             y+Math.sin(dustAng)*tailLen*0.8*ratio+Math.sin(dustAng+Math.PI/2)*spread,
             Math.max(0.3,1.0-ratio*0.7),0,Math.PI*2);
      ic.fillStyle=`rgba(255,215,110,${(alpha*(1-ratio)*(0.30+nearSun*0.18)).toFixed(2)})`; ic.fill();
    }
    for(const d of ISON_INTRO_NUCLEUS){
      const bright=0.6+(1-d.nd)*0.4;
      ic.beginPath(); ic.arc(x+d.lx*2.6,y+d.ly*2.6,Math.max(0.3,d.sz),0,Math.PI*2);
      ic.fillStyle=`rgba(${Math.round(195+bright*55)},${Math.round(225+bright*30)},255,${(alpha*bright*(1+nearSun*0.35)).toFixed(2)})`; ic.fill();
    }
    const g=ic.createRadialGradient(x,y,0,x,y,12+nearSun*16);
    g.addColorStop(0,`rgba(170,215,255,${(alpha*(0.18+nearSun*0.14)).toFixed(2)})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ic.fillStyle=g; ic.fillRect(x-28,y-28,56,56);
  }
  function tickIsonIntro(cw, ch){
    if(!iison){
      iisonTimer+=16;
      if(iisonTimer>=ISON_INTERVAL) spawnIntroIson();
      return;
    }
    if(iison.done) return;
    iison.t=Math.min(1,iison.t+iison.spd);
    const pos=getIsonIntroPos(iison.t,cw,ch);
    const dt=Math.min(1,iison.t+0.01);
    const p2=getIsonIntroPos(dt,cw,ch);
    const ang=Math.atan2(p2.y-pos.y,p2.x-pos.x);

    // 소멸 진행도
    const disinT=Math.max(0,Math.min(1,(iison.t-0.52)/0.12));
    const alive=1-disinT;
    const nearSunRaw=Math.max(0,1-Math.abs(iison.t-0.50)/0.18);

    // 소멸 파티클
    if(!iison.particles) iison.particles=[];
    if(disinT>0 && disinT<0.95){
      for(let i=0;i<Math.floor(nearSunRaw*2+1);i++){
        const a2=Math.random()*Math.PI*2, spd=1.2+Math.random()*2.8;
        const col=Math.random()<0.5
          ?`rgba(255,${Math.round(140+Math.random()*80)},40`
          :`rgba(255,${Math.round(195+Math.random()*55)},110`;
        iison.particles.push({x:pos.x,y:pos.y,vx:Math.cos(a2)*spd,vy:Math.sin(a2)*spd,life:1,decay:0.022+Math.random()*0.028,sz:0.5+Math.random()*1.0,col});
      }
    }
    if(!iison.flashDone && iison.t>0.54){
      iison.flashDone=true;
      showEventToast('💥  Comet ISON — 태양열에 의해 소멸');
      ic.fillStyle='rgba(255,220,120,0.14)'; ic.fillRect(0,0,cw,ch);
    }
    // 파티클 렌더
    for(let i=iison.particles.length-1;i>=0;i--){
      const p=iison.particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96; p.life-=p.decay;
      if(p.life<=0){iison.particles.splice(i,1);continue;}
      ic.beginPath(); ic.arc(p.x,p.y,Math.max(0.2,p.sz*p.life),0,Math.PI*2);
      ic.fillStyle=`${p.col},${(p.life*0.82).toFixed(2)})`; ic.fill();
    }
    // 트레일
    iison.trail.push({x:pos.x,y:pos.y});
    if(iison.trail.length>50) iison.trail.shift();
    for(let i=0;i<iison.trail.length;i++){
      const tr=iison.trail[i],ratio=i/iison.trail.length;
      ic.beginPath(); ic.arc(tr.x,tr.y,0.5+ratio*0.8,0,Math.PI*2);
      ic.fillStyle=`rgba(170,215,255,${(ratio*ratio*0.25*alive).toFixed(2)})`; ic.fill();
    }
    if(!iison.shown&&iison.t>0.40&&iison.t<0.52){
      iison.shown=true; showEventToast('🌠  Comet ISON — 태양 근접 통과');
    }
    if(alive>0.02){
      const fi=iison.t<0.04?iison.t/0.04:1;
      drawIsonIntro(pos.x,pos.y,ang,fi*alive*0.88,iison.t);
    }
    if(iison.t>=1 && (!iison.particles||iison.particles.length===0)){
      iison.done=true; iisonTimer=0; iison=null;
    }
  }
  let zooming   = false;
  let zoomIdx   = -1;
  let zoomT     = 0;
  let zoomSX    = 0, zoomSY = 0; // 줌 시작 행성 위치
  let mainReady = false;

  // ── 인트로 렌더 루프 ──
  let iActive = true;
  let iAY = 0; // 인트로 자전각

  function introFrame(){
    if(!iActive) return;
    requestAnimationFrame(introFrame);
    iAY += 0.006;
    iAngle += 0.0016;

    const cw=iW, ch=iH;
    ic.clearRect(0,0,cw,ch);
    ic.fillStyle='#00000e'; ic.fillRect(0,0,cw,ch);

    // 별 (배경 고정)
    for(const s of iStars){
      s.a+=s.da;
      if(s.a>s.hi){s.a=s.hi;s.da=-Math.abs(s.da);}
      if(s.a<s.lo){s.a=s.lo;s.da= Math.abs(s.da);}
      ic.beginPath(); ic.arc(s.x*cw,s.y*ch,s.r,0,Math.PI*2);
      ic.fillStyle=`rgba(255,255,255,${s.a.toFixed(2)})`; ic.fill();
    }

    // 행성 위치 계산
    for(let i=0;i<LAYOUT.length;i++){
      const o=LAYOUT[i];
      const a = iAngle*o.spd + o.ph;
      iPos[i] = {
        x: cw/2 + Math.cos(a)*o.rx*cw,
        y: ch/2 + Math.sin(a)*o.ry*ch
      };
    }

    // 줌인 상태 계산
    let zoomScale=1, zoomE=0;
    if(zooming){
      zoomT = Math.min(1, zoomT+0.045);
      zoomE = zoomT<0.5 ? 2*zoomT*zoomT : 1-Math.pow(-2*zoomT+2,2)/2;
      zoomScale = 1 + zoomE*22;
      if(zoomT > 0.55 && !mainReady){
        mainReady = true;
        currentIdx = zoomIdx;
        if(!planetCache[currentIdx]) planetCache[currentIdx]=buildPlanet(PLANETS[currentIdx]);
        currentDots = planetCache[currentIdx];
        document.getElementById('p-name-ko').textContent=PLANETS[currentIdx].nameKo;
        document.getElementById('p-name-en').textContent=PLANETS[currentIdx].nameEn;
        updatePopup(currentIdx); updateMinimap(currentIdx);
        bgR=PLANETS[currentIdx].bgTint[0];
        bgG=PLANETS[currentIdx].bgTint[1];
        bgB=PLANETS[currentIdx].bgTint[2];
        showMainUI();
      }
      if(zoomT > 0.7){
        const fadeT = (zoomT-0.7)/0.3;
        introEl.style.opacity = (1-fadeT).toFixed(3);
      }
    }

    // ── 줌인 변환 — 클릭한 행성을 피벗으로 ──
    ic.save();
    if(zooming){
      // 피벗(행성)을 화면 중앙으로 이동시키면서 스케일
      ic.translate(cw/2, ch/2);
      ic.scale(zoomScale, zoomScale);
      ic.translate(-zoomSX, -zoomSY);
    }

    // 궤도선
    for(let i=1;i<LAYOUT.length;i++){
      const o=LAYOUT[i];
      ic.beginPath();
      ic.ellipse(cw/2,ch/2, o.rx*cw, o.ry*ch, 0, 0, Math.PI*2);
      ic.strokeStyle='rgba(120,145,200,0.07)';
      ic.lineWidth=0.8; ic.stroke();
    }

    // 행성 렌더 (변환 좌표계 기준)
    const radii = getIntroRadii();
    const FOVi=680, TILTi=0.38;
    const DSORT2=(a,b)=>a.depth-b.depth;

    // 변환 내부에서의 행성 좌표 (원본)
    for(let i=0;i<PLANETS.length;i++){
      const o=LAYOUT[i];
      const a = iAngle*o.spd + o.ph;
      const wx = cw/2 + Math.cos(a)*o.rx*cw;
      const wy = ch/2 + Math.sin(a)*o.ry*ch;

      const[gr,gg,gb,si,so,ga]=GLOWS[i];
      const gs=so*(radii[i]/PLANETS[i].bodyR)*2.2;
      const grd=ic.createRadialGradient(wx,wy,0,wx,wy,gs);
      grd.addColorStop(0,`rgba(${gr},${gg},${gb},${(ga*(i===0?1.8:1.2)).toFixed(3)})`);
      grd.addColorStop(0.4,`rgba(${gr},${gg},${gb},${(ga*0.3).toFixed(3)})`);
      grd.addColorStop(1,'rgba(0,0,0,0)');
      ic.fillStyle=grd; ic.fillRect(wx-gs,wy-gs,gs*2,wy+gs);

      const dots=getIntroDots(i);
      const r=radii[i];
      const pscale=r/PLANETS[i].bodyR;
      const projected=[];
      for(const d of dots){
        let[px,py,pz]=rotY(d.ox,d.oy,d.oz,iAY);
        [px,py,pz]=rotX(px,py,pz,TILTi);
        const p=FOVi/(FOVi+pz*0.45);
        projected.push({sx:wx+px*p*pscale, sy:wy+py*p*pscale, depth:pz, sz:d.sz*p, col:d.col});
      }
      projected.sort(DSORT2);
      for(const pd of projected){
        ic.beginPath();
        ic.arc(pd.sx, pd.sy, Math.max(0.28, pd.sz*pscale), 0, Math.PI*2);
        ic.fillStyle=pd.col; ic.fill();
      }

      // 호버 링 — iPos 기준 (화면 좌표)로 히트테스트하고, 렌더는 변환 내부 wx/wy
      if(iHover===i){
        ic.beginPath(); ic.arc(wx,wy,r+6,0,Math.PI*2);
        ic.strokeStyle=`rgba(200,218,255,0.55)`; ic.lineWidth=1.2; ic.stroke();
        ic.beginPath(); ic.arc(wx,wy,r+12,0,Math.PI*2);
        ic.strokeStyle=`rgba(200,218,255,0.15)`; ic.lineWidth=0.8; ic.stroke();
      }
    }

    ic.restore();

    // ʻOumuamua 인트로
    if(!zooming) tickOumuIntro(cw, ch);
    // Comet ISON 인트로
    if(!zooming) tickIsonIntro(cw, ch);

    // 줌인 완료
    if(zooming && zoomT>=1){
      zooming=false; iActive=false;
      introEl.style.opacity='0';
      introEl.style.pointerEvents='none';
      setTimeout(()=>{ introEl.style.display='none'; }, 400);
    }
  }

  // ── 마우스/터치 이벤트 ──
  function getHit(mx,my){
    const radii=getIntroRadii();
    for(let i=0;i<iPos.length;i++){
      if(Math.hypot(mx-iPos[i].x, my-iPos[i].y) < radii[i]+14) return i;
    }
    return -1;
  }

  introC.addEventListener('mousemove',e=>{
    if(zooming) return;
    const hit=getHit(e.clientX,e.clientY);
    iHover=hit;
    introC.style.cursor=hit>=0?'pointer':'default';
    if(hit>=0){
      labelEl.textContent=`${PLANETS[hit].nameKo}  ·  ${PLANETS[hit].nameEn}`;
      labelEl.style.left=(iPos[hit].x+18)+'px';
      labelEl.style.top=(iPos[hit].y-22)+'px';
      labelEl.classList.add('show');
    } else {
      labelEl.classList.remove('show');
    }
  });
  introC.addEventListener('mouseleave',()=>{iHover=-1; labelEl.classList.remove('show');});

  introC.addEventListener('click',e=>{
    if(zooming) return;
    const hit=getHit(e.clientX,e.clientY);
    if(hit<0) return;
    zooming=true; zoomIdx=hit; zoomT=0;
    zoomSX=iPos[hit].x; zoomSY=iPos[hit].y;
    labelEl.classList.remove('show');
    document.getElementById('intro-title').style.cssText='opacity:0;transition:opacity 0.35s;';
    document.getElementById('intro-hint').style.cssText='opacity:0;transition:opacity 0.35s;';
  });

  introC.addEventListener('touchend',e=>{
    if(zooming) return;
    const t=e.changedTouches[0];
    const hit=getHit(t.clientX,t.clientY);
    if(hit<0) return;
    zooming=true; zoomIdx=hit; zoomT=0;
    zoomSX=iPos[hit].x; zoomSY=iPos[hit].y;
  });

  // ── 인트로 복귀 ──
  function restartIntro(){
    // 상태 초기화
    zooming=false; zoomT=0; mainReady=false;
    iActive=true; iHover=-1;
    introEl.style.display='';
    introEl.style.opacity='0';
    introEl.style.pointerEvents='auto';
    introEl.style.transition='opacity 0.5s';
    // 메인 UI 숨김
    document.querySelectorAll('.main-ui').forEach(el=>{
      el.classList.add('hidden');
    });
    // 팝업 닫기
    setPopupVisible(false);
    // 사운드 끄기
    if(soundOn){ deactivateAll(); }
    // 타이틀/힌트 복원
    const title=document.getElementById('intro-title');
    const hint=document.getElementById('intro-hint');
    title.style.cssText='';hint.style.cssText='';
    // 페이드인
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{ introEl.style.opacity='1'; });
    });
    introFrame();
  }
  // 전역 노출
  window.returnToIntro = restartIntro;

  // 홈버튼
  document.getElementById('home-btn').addEventListener('click', restartIntro);

  introFrame();
})();

resize();frame();

// ─── Camera / Hand ──────────────────────────────────────
const vid=document.getElementById('vid');
const camWrap=document.getElementById('camwrap');
const camCanvas=document.getElementById('camview');
const camCtx2=camCanvas.getContext('2d');
camCanvas.width=320;camCanvas.height=240;
const camDot=document.getElementById('cam-dot');
const camLabel=document.getElementById('cam-label');
const CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
function pinchToScale(d){return 0.2+Math.max(0,Math.min(1,(d-0.03)/0.37))*3.8;}
let handLostTimer=null,handActive=false;

function onHandResults(res){
  camCtx2.save();camCtx2.scale(-1,1);camCtx2.translate(-320,0);camCtx2.drawImage(res.image,0,0,320,240);camCtx2.restore();
  if(!res.multiHandLandmarks?.length){
    if(handActive&&!handLostTimer)handLostTimer=setTimeout(()=>{
      camTargetScale=null;handActive=false;lastWristX=null;camRotDelta=0;
      camDot.classList.remove('on');camLabel.textContent='손 없음';handLostTimer=null;
    },600);return;
  }
  if(handLostTimer){clearTimeout(handLostTimer);handLostTimer=null;}
  const lm=res.multiHandLandmarks[0],th=lm[4],ix=lm[8];

  // 스켈레톤 그리기
  camCtx2.strokeStyle='rgba(100,200,255,0.45)';camCtx2.lineWidth=1.2;
  for(const[a,b]of CONN){camCtx2.beginPath();camCtx2.moveTo((1-lm[a].x)*320,lm[a].y*240);camCtx2.lineTo((1-lm[b].x)*320,lm[b].y*240);camCtx2.stroke();}
  for(const l of lm){camCtx2.beginPath();camCtx2.arc((1-l.x)*320,l.y*240,2.5,0,Math.PI*2);camCtx2.fillStyle='rgba(100,200,255,0.6)';camCtx2.fill();}

  const pinchDist=Math.hypot(th.x-ix.x,th.y-ix.y);
  const isPinching=pinchDist<0.07; // 핀치 감지 임계값

  // 엄지·검지 표시
  const tx=(1-th.x)*320,ty=th.y*240,iix=(1-ix.x)*320,iiy=ix.y*240;
  camCtx2.beginPath();camCtx2.arc(tx,ty,7,0,Math.PI*2);
  camCtx2.fillStyle=isPinching?'#ffcc00':'#ff6b6b';camCtx2.fill();
  camCtx2.beginPath();camCtx2.arc(iix,iiy,7,0,Math.PI*2);
  camCtx2.fillStyle=isPinching?'#ffcc00':'#4ecdc4';camCtx2.fill();
  camCtx2.beginPath();camCtx2.moveTo(tx,ty);camCtx2.lineTo(iix,iiy);
  camCtx2.strokeStyle=isPinching?'rgba(255,210,0,0.9)':'rgba(255,255,255,0.7)';
  camCtx2.lineWidth=isPinching?2.5:2;camCtx2.stroke();

  // ── 모드 분기 ──────────────────────────────────────────
  // 손목 기준점 (lm[0]) — 카메라 미러링 반영해서 1-x
  const wristX=1-lm[0].x;

  if(isPinching){
    // 핀치 모드: 크기 조절
    camTargetScale=pinchToScale(pinchDist);
    lastWristX=null; // 회전 상태 초기화
    camLabel.textContent='✌ 크기 조절';
  }else{
    // 손바닥 모드: 좌우 이동 → 회전
    camTargetScale=null;
    if(lastWristX!==null){
      const dx=wristX-lastWristX; // -1~1 범위 이동량
      // 손 좌표는 0~1이므로 이동량에 민감도 곱해서 angleY에 반영
      camRotDelta=dx*6.5;
    }
    lastWristX=wristX;
    // 회전 방향 표시
    const arrow=camRotDelta>0.01?'→ 회전':camRotDelta<-0.01?'← 회전':'↔ 회전 모드';
    camLabel.textContent=arrow;
  }

  handActive=true;camDot.classList.add('on');
}
document.getElementById('cam-btn').addEventListener('click',async()=>{
  const btn=document.getElementById('cam-btn');
  if(typeof Hands==='undefined'){btn.textContent='라이브러리 로드 실패';return;}
  btn.textContent='연결 중…';btn.style.pointerEvents='none';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}});
    vid.srcObject=stream;await vid.play();
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.72,minTrackingConfidence:0.5});
    hands.onResults(onHandResults);
    let proc=false;
    async function camLoop(){if(!proc&&vid.readyState>=2){proc=true;await hands.send({image:vid});proc=false;}setTimeout(camLoop,33);}
    camLoop();
    camWrap.style.display='block';btn.style.display='none';camLabel.textContent='손 없음';
  }catch(e){btn.textContent='카메라 권한이 필요합니다';btn.style.pointerEvents='auto';}
});
